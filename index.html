  return d.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
}

function AcademicCalendar({ user }) {
  const isAdmin = user?.email === "bt25civ049@students.vnit.ac.in";
  const [userRole,       setUserRole]       = useState('student');
  const [term,           setTerm]           = useState('Winter');
  const [year,           setYear]           = useState('2026');
  const [activeSession,  setActiveSession]  = useState('Winter / 2026');
  const [uploading,      setUploading]      = useState(false);
  const [calendarUrlInput, setCalendarUrlInput] = useState('');
  const [zoom,           setZoom]           = useState(1);
  const [events,         setEvents]         = useState([]);
  const [loading,        setLoading]        = useState(false);
  const [syncError,      setSyncError]      = useState('');
  const [showModal,      setShowModal]      = useState(false);
  const [form,           setForm]           = useState({ name:'', date:'', description:'' });
  const [deletingId,     setDeletingId]     = useState(null);
  const [documentUrl,    setDocumentUrl]    = useState("https://drive.google.com/file/d/MOCK_FILE_ID/preview");

  useEffect(() => {
    fetch(`${API_BASE}/api/calendar-config`)
      .then(res => res.json())
      .then(data => {
        if (data && data.url) {
          setDocumentUrl(data.url);
          setTerm(data.term);
          setYear(data.year);
          setActiveSession(`${data.term} / ${data.year}`);
        }
      })
      .catch(err => console.error("Error loading calendar config:", err));
  }, []);

  useEffect(() => {
    if (!user?.email) return;
    setLoading(true);
    fetch(`${API_BASE}/api/calendar/${user.email}`)
      .then(res => res.json())
      .then(data => {
        if (Array.isArray(data)) setEvents(data);
        setSyncError('');
      })
      .catch(err => {
        console.error("Cloud fetch failed:", err);
        setSyncError("⚠ Could not reach backend — showing local data.");
        try {
          const saved = localStorage.getItem('studentos_calendar');
          if (saved) setEvents(JSON.parse(saved));
        } catch(e) {}
      })
      .finally(() => setLoading(false));
  }, [user]);

  const syncToCloud = async (updatedEvents) => {
    if (!user?.email) return;
    try {
      const response = await fetch(`${API_BASE}/api/calendar/${user.email}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ events: updatedEvents })
      });
      if (!response.ok) throw new Error("Sync failed");
      setSyncError('');
    } catch (error) {
      console.error("Cloud sync failed:", error);
      setSyncError("⚠ Could not reach backend — showing local data.");
      localStorage.setItem('studentos_calendar', JSON.stringify(updatedEvents));
    }
  };



  // Always start in appropriate view on mount
  useEffect(() => {
    setUserRole(isAdmin ? 'admin' : 'student');
  }, [isAdmin]);
  const fileRef   = useRef(null);
  const viewerRef = useRef(null);
  const scrollRef = useRef(null);
  const iframeRef = useRef(null);
  const panRef    = useRef({ isDragging: false, startX: 0, startY: 0, scrollLeft: 0, scrollTop: 0 });

  // Page-wide drag-to-scroll when zoomed in
  useEffect(() => {
    let isPageDragging = false;
    let startX = 0, startY = 0;
    let startScrollLeft = 0, startScrollTop = 0;

    const handlePageMouseDown = e => {
      const target = e.target;

      // Don't drag if click originates inside calendar viewer container (let calendar local drag handle it)
      if (viewerRef.current && viewerRef.current.contains(target)) {
        return;
      }

      // Check if target is inside the modal or popup
      const modalOverlay = document.querySelector('[style*="overlay"]');
      if (modalOverlay && modalOverlay.contains(target)) {
        return;
      }

      // Don't drag on interactive elements
      const interactiveTags = ['BUTTON', 'A', 'INPUT', 'SELECT', 'TEXTAREA', 'OPTION', 'IFRAME', 'LABEL'];
      if (interactiveTags.includes(target.tagName)) {
        return;
      }

      // Don't drag if target cursor is pointer (star bookmark, close icon, list items, etc.)
      const isPointer = window.getComputedStyle(target).cursor === 'pointer';
      if (isPointer) {
        return;
      }

      isPageDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      startScrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
      startScrollTop = window.pageYOffset || document.documentElement.scrollTop;

      document.body.style.cursor = 'grabbing';
      if (iframeRef.current) {
        iframeRef.current.style.pointerEvents = 'none';
      }
      e.preventDefault();
    };

    const handlePageMouseMove = e => {
      if (!isPageDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      window.scrollTo(startScrollLeft - dx, startScrollTop - dy);
    };

    const handlePageMouseUp = () => {
      if (!isPageDragging) return;
      isPageDragging = false;
      document.body.style.cursor = '';
      if (iframeRef.current) {
        iframeRef.current.style.pointerEvents = 'auto';
      }
    };

    window.addEventListener('mousedown', handlePageMouseDown);
    window.addEventListener('mousemove', handlePageMouseMove);
    window.addEventListener('mouseup', handlePageMouseUp);

    return () => {
      window.removeEventListener('mousedown', handlePageMouseDown);
      window.removeEventListener('mousemove', handlePageMouseMove);
      window.removeEventListener('mouseup', handlePageMouseUp);
      document.body.style.cursor = '';
    };
  }, []);

  const calendarMouseMoveRef = useRef();
  const calendarMouseUpRef = useRef();

  useEffect(() => {
    calendarMouseMoveRef.current = e => {
      if (!panRef.current.isDragging || !scrollRef.current) return;
      const dx = e.clientX - panRef.current.startX;
      const dy = e.clientY - panRef.current.startY;
      scrollRef.current.scrollLeft = panRef.current.scrollLeft - dx;
      scrollRef.current.scrollTop = panRef.current.scrollTop - dy;
    };
    calendarMouseUpRef.current = () => {
      if (!scrollRef.current) return;
      panRef.current.isDragging = false;
      scrollRef.current.style.cursor = zoom > 1 ? 'grab' : 'default';
      if (iframeRef.current) {
        iframeRef.current.style.pointerEvents = 'auto';
      }
      window.removeEventListener('mousemove', onCalendarMouseMove);
      window.removeEventListener('mouseup', onCalendarMouseUp);
    };
  });

  const onCalendarMouseMove = e => calendarMouseMoveRef.current(e);
  const onCalendarMouseUp = () => calendarMouseUpRef.current();

  const handleMouseDown = e => {
    if (!scrollRef.current) return;
    panRef.current = {
      isDragging: true,
      startX: e.clientX,
      startY: e.clientY,
      scrollLeft: scrollRef.current.scrollLeft,
      scrollTop: scrollRef.current.scrollTop
    };
    scrollRef.current.style.cursor = 'grabbing';
    if (iframeRef.current) {
      iframeRef.current.style.pointerEvents = 'none';
    }
    window.addEventListener('mousemove', onCalendarMouseMove);
    window.addEventListener('mouseup', onCalendarMouseUp);
  };

  useEffect(() => {
    return () => {
      window.removeEventListener('mousemove', onCalendarMouseMove);
      window.removeEventListener('mouseup', onCalendarMouseUp);
    };
  }, []);

  const handleUpload = () => {
    if (!calendarUrlInput) return;
    setUploading(true);
    
    let formattedUrl = calendarUrlInput;
    // Convert view/edit to preview for iframe rendering compatibility
    if (formattedUrl.includes('/view')) {
      formattedUrl = formattedUrl.replace(/\/view.*/, '/preview');
    } else if (formattedUrl.includes('/edit')) {
      formattedUrl = formattedUrl.replace(/\/edit.*/, '/preview');
    }

    fetch(`${API_BASE}/api/admin/publish-calendar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ term, year, url: formattedUrl, admin_email: user?.email })
    })
    .then(res => {
      if (!res.ok) throw new Error("Failed to save calendar config");
      return res.json();
    })
    .then(() => {
      setDocumentUrl(formattedUrl);
      setActiveSession(term + ' / ' + year);
      setCalendarUrlInput('');
    })
    .catch(err => {
      console.error(err);
      alert("⚠ Error saving calendar configuration to database.");
    })
    .finally(() => {
      setUploading(false);
    });
  };

  const handleDeleteCalendar = () => {
    if (!confirm('Are you sure you want to delete the shared calendar?')) return;
    setUploading(true);
    fetch(`${API_BASE}/api/admin/publish-calendar`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_email: user?.email })
    })
    .then(res => {
      if (!res.ok) throw new Error("Failed to delete calendar config");
      return res.json();
    })
    .then(() => {
      setDocumentUrl("https://drive.google.com/file/d/MOCK_FILE_ID/preview");
      setActiveSession("Winter / 2026");
      setTerm('Winter');
      setYear('2026');
      alert("Calendar deleted successfully.");
    })
    .catch(err => {
      console.error(err);
      alert("⚠ Error deleting calendar from database.");
    })
    .finally(() => {
      setUploading(false);
    });
  };

  const zoomIn  = () => setZoom(z => Math.min(+(z + 0.15).toFixed(2), 2));
  const zoomOut = () => setZoom(z => Math.max(+(z - 0.15).toFixed(2), 0.5));
  const fullscreen = () => viewerRef.current && viewerRef.current.requestFullscreen && viewerRef.current.requestFullscreen();

  const addEvent = e => {
    e.preventDefault();
    if (!form.name || !form.date) return;
    const ev = { id:Date.now(), name:form.name, date:form.date, description:form.description, bookmarked:false };
    const updated = [ev, ...events];
    setEvents(updated);
    syncToCloud(updated);
    setForm({ name:'', date:'', description:'' });
    setShowModal(false);
  };

  const bookmark = id => {
    const upd = events.map(e => e.id === id ? { ...e, bookmarked:!e.bookmarked } : e);
    const sorted = [...upd.filter(e => e.bookmarked), ...upd.filter(e => !e.bookmarked)];
    setEvents(sorted);
    syncToCloud(sorted);
  };

  const delEvent = id => {
    const updated = events.filter(e => e.id !== id);
    setEvents(updated);
    syncToCloud(updated);
    setDeletingId(null);
  };

  /* ── shared inline styles ── */
  const S = {
    page:    { padding:'1.5rem 2rem', display:'flex', flexDirection:'column', gap:'1.5rem', fontFamily:"'Inter',sans-serif", minHeight:'100vh', cursor:'grab' },
    devBan:  { display:'flex', alignItems:'center', flexWrap:'wrap', gap:'0.75rem', padding:'0.65rem 1rem', borderRadius:'0.85rem', border:'1px solid rgba(245,158,11,0.35)', background:'rgba(245,158,11,0.05)' },
    devLbl:  { fontSize:'0.72rem', fontWeight:800, color:'#f59e0b', letterSpacing:'0.08em', textTransform:'uppercase' },
    devBtns: { marginLeft:'auto', display:'flex', gap:'0.35rem' },
    header:  { display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexWrap:'wrap', gap:'1rem' },
    badge:   { display:'flex', alignItems:'center', gap:'0.5rem', padding:'0.55rem 1rem', borderRadius:'9999px', background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.3)', fontSize:'0.75rem', fontWeight:600, color:'#a5b4fc', letterSpacing:'0.06em', whiteSpace:'nowrap' },
    pulse:   { width:'8px', height:'8px', borderRadius:'50%', background:'#4ade80', flexShrink:0, animation:'calPulse 1.4s infinite' },
    adminCard:{ borderRadius:'1.25rem', border:'1px solid rgba(245,158,11,0.2)', background:'rgba(15,23,42,0.85)', backdropFilter:'blur(20px)', padding:'1.5rem', display:'flex', flexDirection:'column', gap:'1.25rem' },
    adminHdr: { display:'flex', alignItems:'center', gap:'0.5rem' },
    adminPill:{ marginLeft:'auto', padding:'0.2rem 0.75rem', borderRadius:'9999px', background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', color:'#f59e0b', fontSize:'0.65rem', fontWeight:800 },
    grid2:   { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem' },
    lbl:     { display:'block', fontSize:'0.62rem', fontWeight:700, color:'#475569', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:'0.5rem' },
    sel:     { width:'100%', background:'rgba(30,41,59,0.8)', border:'1px solid rgba(71,85,105,0.5)', borderRadius:'0.75rem', padding:'0.65rem 1rem', color:'#e2e8f0', fontSize:'0.82rem', outline:'none', cursor:'pointer' },
    dropBase:{ border:'2px dashed rgba(71,85,105,0.5)', borderRadius:'1.25rem', padding:'2.5rem', textAlign:'center', cursor:'pointer', transition:'all 0.25s', userSelect:'none' },
    dropDrag:{ borderColor:'rgba(245,158,11,0.7)', background:'rgba(245,158,11,0.07)', transform:'scale(1.01)' },
    dropOk:  { borderColor:'rgba(74,222,128,0.6)', background:'rgba(74,222,128,0.05)' },
    upBtn:   { width:'100%', padding:'1rem', borderRadius:'0.9rem', border:'none', fontSize:'0.8rem', fontWeight:800, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:'0.6rem', transition:'all 0.25s' },
    upActive:{ background:'linear-gradient(135deg,#f59e0b,#ea580c)', color:'#1c1917', boxShadow:'0 6px 24px rgba(245,158,11,0.22)' },
    upBusy:  { background:'rgba(30,41,59,0.8)', color:'#475569', cursor:'not-allowed' },
    spin:    { width:'16px', height:'16px', borderRadius:'50%', border:'2px solid rgba(71,85,105,0.5)', borderTop:'2px solid #94a3b8', animation:'calSpin 0.7s linear infinite' },
    viewer:  { position:'relative', borderRadius:'1.25rem', border:'1px solid rgba(51,65,85,0.5)', background:'rgba(15,23,42,0.6)', backdropFilter:'blur(20px)', overflow:'hidden', height:'680px', boxShadow:'0 24px 64px rgba(0,0,0,0.5)' },
    topBar:  { position:'absolute', top:0, left:0, right:0, zIndex:20, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0.75rem 1rem', background:'linear-gradient(to bottom,rgba(2,6,23,0.95) 0%,transparent 100%)', pointerEvents:'none' },
    botBar:  { position:'absolute', bottom:0, left:0, right:0, zIndex:20, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0.75rem 1rem', background:'linear-gradient(to top,rgba(2,6,23,0.95) 0%,transparent 100%)', pointerEvents:'none' },
    tbBtn:   { display:'flex', alignItems:'center', gap:'0.4rem', padding:'0.4rem 0.85rem', borderRadius:'0.55rem', background:'rgba(30,41,59,0.9)', border:'1px solid rgba(71,85,105,0.6)', color:'#cbd5e1', fontSize:'0.73rem', fontWeight:600, cursor:'pointer', backdropFilter:'blur(10px)', transition:'all 0.18s', textDecoration:'none', pointerEvents:'auto' },
    zoomBox: { display:'flex', alignItems:'center', background:'rgba(30,41,59,0.9)', border:'1px solid rgba(71,85,105,0.6)', borderRadius:'0.55rem', overflow:'hidden', backdropFilter:'blur(10px)', pointerEvents:'auto' },
    zoomBtn: { padding:'0.4rem 0.75rem', color:'#cbd5e1', fontWeight:700, fontSize:'1rem', cursor:'pointer', background:'transparent', border:'none', transition:'background 0.15s' },
    zoomLbl: { padding:'0 0.65rem', fontSize:'0.7rem', color:'#94a3b8', fontFamily:'monospace', borderLeft:'1px solid rgba(71,85,105,0.5)', borderRight:'1px solid rgba(71,85,105,0.5)', minWidth:'3.5rem', textAlign:'center' },
    addBtn:  { display:'flex', alignItems:'center', gap:'0.4rem', padding:'0.4rem 1rem', borderRadius:'0.55rem', background:'rgba(99,102,241,0.85)', border:'1px solid rgba(99,102,241,0.6)', color:'#fff', fontSize:'0.73rem', fontWeight:700, cursor:'pointer', boxShadow:'0 4px 14px rgba(99,102,241,0.25)', transition:'all 0.18s', pointerEvents:'auto' },
    
    evSec:  { display:'flex', flexDirection:'column', gap:'1rem', paddingBottom:'3rem' },
    evHdr:  { display:'flex', alignItems:'center', gap:'0.75rem' },
    evCnt:  { marginLeft:'auto', padding:'0.15rem 0.6rem', borderRadius:'9999px', background:'rgba(99,102,241,0.12)', border:'1px solid rgba(99,102,241,0.25)', color:'#818cf8', fontSize:'0.7rem', fontWeight:700 },
    evEmpty:{ borderRadius:'1.25rem', border:'1px dashed rgba(30,41,59,0.9)', background:'rgba(15,23,42,0.3)', padding:'4rem 1rem', textAlign:'center' },
    evCard: { position:'relative', borderRadius:'1.25rem', padding:'1.2rem 1.4rem', backdropFilter:'blur(16px)', transition:'all 0.25s' },
    evNorm: { border:'1px solid rgba(30,41,59,0.8)', background:'rgba(15,23,42,0.6)' },
    evBook: { border:'1px solid rgba(245,158,11,0.45)', background:'rgba(245,158,11,0.04)', boxShadow:'0 0 26px rgba(245,158,11,0.1)' },
    evDel:  { position:'absolute', top:'0.85rem', right:'0.85rem', width:'1.5rem', height:'1.5rem', borderRadius:'0.35rem', display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', color:'#94a3b8', cursor:'pointer', fontSize:'0.7rem', fontWeight:800, transition:'all 0.15s' },
    evBody: { display:'flex', alignItems:'flex-start', gap:'1rem', paddingRight:'2rem' },
    star:   { fontSize:'1.1rem', flexShrink:0, cursor:'pointer', transition:'all 0.25s', lineHeight:1, width:'2rem', height:'2rem', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid rgba(255,255,255,0.08)' },
    starOn: { color:'#f59e0b', background:'rgba(245,158,11,0.12)', borderColor:'rgba(245,158,11,0.4)', filter:'drop-shadow(0 0 6px rgba(245,158,11,0.7))' },
    starOff:{ color:'#64748b', background:'rgba(255,255,255,0.03)', borderColor:'rgba(255,255,255,0.08)' },
    evInfo: { flex:1, minWidth:0 },
    evName: { fontWeight:700, fontSize:'0.88rem', letterSpacing:'-0.01em' },
    evDate: { fontSize:'0.72rem', marginTop:'0.25rem', fontFamily:'monospace' },
    evDesc: { fontSize:'0.75rem', color:'#475569', marginTop:'0.5rem', lineHeight:1.65 },
    priBadge:{ display:'inline-flex', alignItems:'center', padding:'0.15rem 0.55rem', borderRadius:'9999px', background:'rgba(245,158,11,0.15)', border:'1px solid rgba(245,158,11,0.35)', color:'#f59e0b', fontSize:'0.6rem', fontWeight:800, letterSpacing:'0.1em', textTransform:'uppercase', marginLeft:'0.6rem' },
    overlay: { position:'fixed', inset:0, zIndex:1200, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.8)', backdropFilter:'blur(12px)', padding:'1rem' },
    modal:   { width:'100%', maxWidth:'440px', background:'rgba(15,23,42,0.97)', border:'1px solid rgba(51,65,85,0.6)', borderRadius:'1.5rem', padding:'2rem', boxShadow:'0 36px 96px rgba(0,0,0,0.7)', backdropFilter:'blur(32px)' },
    mInp:    { width:'100%', background:'rgba(30,41,59,0.8)', border:'1px solid rgba(71,85,105,0.5)', borderRadius:'0.75rem', padding:'0.65rem 1rem', color:'#e2e8f0', fontSize:'0.82rem', outline:'none', fontFamily:'inherit', boxSizing:'border-box' },
    mBtns:   { display:'flex', gap:'0.75rem', marginTop:'1rem' },
    mCancel: { flex:1, padding:'0.85rem', borderRadius:'0.75rem', border:'1px solid rgba(71,85,105,0.5)', background:'transparent', color:'#94a3b8', fontSize:'0.82rem', fontWeight:600, cursor:'pointer' },
    mCreate: { flex:1, padding:'0.85rem', borderRadius:'0.75rem', border:'none', background:'linear-gradient(135deg,#4f46e5,#7c3aed)', color:'#fff', fontSize:'0.82rem', fontWeight:800, cursor:'pointer', boxShadow:'0 6px 20px rgba(99,102,241,0.28)' },
  };

  const upBtnStyle = { ...S.upBtn, ...(uploading ? S.upBusy : S.upActive) };
  const ifrStyle = { display:'block', width:'100%', height:'100%', border:'none' };

  return (
    <div style={S.page}>
      {/* ── Pulsing dot keyframes ── */}
      <style>{`
        @keyframes calPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.85)} }
        @keyframes calSpin  { to{transform:rotate(360deg)} }
      `}</style>

      {/* Dev Banner */}
      {isAdmin && (
      <div style={S.devBan}>
        <span style={S.devLbl}>🛠️ Dev Mode — Active Role:</span>
        <div style={S.devBtns}>
          {[['student','Student View'],['admin','Admin View']].map(([r,l]) => (
            <button key={r} onClick={() => setUserRole(r)}
              style={{ padding:'0.3rem 0.75rem', borderRadius:'0.5rem', border:'none', fontSize:'0.7rem', fontWeight:800, letterSpacing:'0.07em', textTransform:'uppercase', cursor:'pointer', transition:'all 0.2s',
                background: userRole===r ? '#f59e0b' : 'rgba(30,41,59,0.8)',
                color: userRole===r ? '#1c1917' : '#94a3b8',
                boxShadow: userRole===r ? '0 4px 14px rgba(245,158,11,0.28)' : 'none',
              }}>
              {l}
            </button>
          ))}
        </div>
      </div>
      )}

      {/* Header */}
      <div style={S.header}>
        <div>
          <h1 style={{ fontSize:'clamp(1.5rem,3vw,2.1rem)', fontWeight:900, letterSpacing:'-0.025em', color:'#f8fafc', margin:0 }}>VNIT Academic Calendar</h1>
          <p style={{ fontSize:'0.78rem', color:'#475569', marginTop:'0.3rem', letterSpacing:'0.05em' }}>Official schedule &amp; personal event planner</p>
        </div>
        <div style={S.badge}>
          <span style={S.pulse}/>
          Active Session: {activeSession}
        </div>
      </div>

      {/* Admin Panel */}
      {userRole === 'admin' && (
        <div style={S.adminCard}>
          <div style={S.adminHdr}>
            <span style={{ fontSize:'0.95rem' }}>⚙️</span>
            <span style={{ fontSize:'0.68rem', fontWeight:900, color:'rgba(245,158,11,0.85)', letterSpacing:'0.1em', textTransform:'uppercase' }}>Admin Control Panel</span>
            <div style={S.adminPill}>ADMIN</div>
          </div>
          <div style={S.grid2}>
            <div>
              <label style={S.lbl}>Session Term</label>
              <select value={term} onChange={e => setTerm(e.target.value)} style={S.sel}>
                {['Summer','Winter'].map(t => <option key={t} value={t} style={{ background:'#0f172a' }}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={S.lbl}>Academic Year</label>
              <select value={year} onChange={e => setYear(e.target.value)} style={S.sel}>
                {['2024','2025','2026','2027','2028'].map(y => <option key={y} value={y} style={{ background:'#0f172a' }}>{y}</option>)}
              </select>
            </div>
          </div>
          <div style={{ margin: '1rem 0' }}>
            <label style={S.lbl}>Calendar Link (PDF or Image URL)</label>
            <input type="url" placeholder="Paste Google Drive Calendar PDF link..." 
              value={calendarUrlInput} onChange={e => setCalendarUrlInput(e.target.value)} 
              style={S.mInp} required />
          </div>
          <div style={{ display: 'flex', gap: '1rem', width: '100%' }}>
            <button onClick={handleUpload} disabled={!calendarUrlInput || uploading} style={{ ...upBtnStyle, flex: 1 }}>
              {uploading
                ? (<><span style={S.spin}/> Publishing Calendar…</>)
                : '⬆️  Publish New Calendar'}
            </button>
            <button onClick={handleDeleteCalendar} disabled={uploading} style={{ ...upBtnStyle, flex: 1, background: uploading ? 'rgba(239,68,68,0.3)' : 'rgba(239,68,68,0.1)', color: uploading ? '#7f1d1d' : '#ef4444', boxShadow: 'none', border: '1px solid rgba(239,68,68,0.3)' }}>
              🗑️ Delete Calendar
            </button>
          </div>
        </div>
      )}

      {/* Admin preview label */}
      {userRole === 'admin' && (
        <div style={{ display:'flex', alignItems:'center', gap:'0.5rem' }}>
          <span>📌</span>
          <span style={{ fontSize:'0.68rem', fontWeight:900, color:'rgba(245,158,11,0.8)', letterSpacing:'0.1em', textTransform:'uppercase' }}>Live Preview of Currently Active Document Below</span>
        </div>
      )}

      {/* Document Controls Row - directly ABOVE the viewer container */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
        <button onClick={fullscreen} style={S.tbBtn}
          onMouseEnter={e => { e.currentTarget.style.background='rgba(51,65,85,0.9)'; e.currentTarget.style.color='#f1f5f9'; }}
          onMouseLeave={e => { e.currentTarget.style.background='rgba(30,41,59,0.9)'; e.currentTarget.style.color='#cbd5e1'; }}>
          ⛶&nbsp; Fullscreen
        </button>
        <div style={S.zoomBox}>
          <button style={S.zoomBtn} onClick={zoomOut}
            onMouseEnter={e => e.currentTarget.style.background='rgba(51,65,85,0.8)'}
            onMouseLeave={e => e.currentTarget.style.background='transparent'}>−</button>
          <span style={S.zoomLbl}>{Math.round(zoom*100)}%</span>
          <button style={S.zoomBtn} onClick={zoomIn}
            onMouseEnter={e => e.currentTarget.style.background='rgba(51,65,85,0.8)'}
            onMouseLeave={e => e.currentTarget.style.background='transparent'}>+</button>
        </div>
      </div>

      {/* Viewer */}
      <div ref={viewerRef} style={S.viewer}>
        {/* Scrollable drag-to-pan wrapper container */}
        <div 
          ref={scrollRef}
          onMouseDown={handleMouseDown}
          style={{ 
            width: '100%', 
            height: '100%', 
            overflow: 'auto', 
            position: 'relative',
            cursor: zoom > 1 ? 'grab' : 'default',
            userSelect: 'none',
            boxSizing: 'border-box',
            paddingTop: '0px',
            paddingBottom: '0px'
          }}
        >
          {/* Transparent overlay over the iframe to capture drags when zoomed in */}
          {zoom > 1 && (
            <div style={{ 
              position: 'absolute', 
              top: 0,
              left: 0,
              width: `${100 * zoom}%`,
              height: `${680 * zoom}px`,
              zIndex: 10, 
              background: 'transparent' 
            }}/>
          )}

          {/* Scale the absolute sizing of the <iframe> or <img> layout frame itself directly */}
          {documentUrl && (documentUrl.endsWith('.jpg') || documentUrl.endsWith('.png') || documentUrl.endsWith('.jpeg')) ? (
            <img 
              ref={iframeRef}
              src={documentUrl}
              alt="VNIT Academic Calendar"
              style={{ 
                display: 'block', 
                width: `${100 * zoom}%`, 
                height: 'auto', 
                minHeight: `${680 * zoom}px`, 
                objectFit: 'contain',
                transition: 'width 0.15s ease' 
              }}
            />
          ) : (
            <iframe 
              ref={iframeRef}
              src={documentUrl}
              title="VNIT Academic Calendar Document" 
              style={{ 
                display: 'block', 
                border: 'none', 
                width: `${100 * zoom}%`, 
                height: `${680 * zoom}px`, 
                transition: 'width 0.15s ease, height 0.15s ease' 
              }}
            />
          )}
        </div>
      </div>

      {/* Download PDF button below the viewer */}
      <div style={{ display: 'flex', justifyContent: 'flex-start', marginTop: '0.5rem' }}>
        <a href={documentUrl}
          target="_blank" rel="noopener noreferrer" style={S.tbBtn}
          onMouseEnter={e => { e.currentTarget.style.background='rgba(51,65,85,0.9)'; e.currentTarget.style.color='#f1f5f9'; }}
          onMouseLeave={e => { e.currentTarget.style.background='rgba(30,41,59,0.9)'; e.currentTarget.style.color='#cbd5e1'; }}>
          💾&nbsp; View / Download Calendar
        </a>
      </div>

      {/* Event Feed */}
      <div style={S.evSec}>
        <div style={S.evHdr}>
          <span style={{ fontSize:'1rem' }}>📌</span>
          <span style={{ fontSize:'0.72rem', fontWeight:900, color:'#94a3b8', letterSpacing:'0.1em', textTransform:'uppercase' }}>
            Personal Milestone &amp; Event Feed
            {loading && <span style={{marginLeft:'0.5rem', fontWeight:500, opacity:0.6}}>(Syncing...)</span>}
          </span>
          {syncError && <span style={{color:'#f87171', fontSize:'0.7rem', fontWeight:600, marginLeft:'auto'}}>{syncError}</span>}
          {events.length > 0 && !syncError && <div style={{...S.evCnt, marginLeft:'auto'}}>{events.length}</div>}
        </div>

        {/* Add Event Button below header */}
        <div style={{ display:'flex', justifyContent:'flex-start' }}>
          <button style={S.addBtn} onClick={() => setShowModal(true)}
            onMouseEnter={e => { e.currentTarget.style.background='rgba(99,102,241,1)'; e.currentTarget.style.transform='scale(1.04)'; }}
            onMouseLeave={e => { e.currentTarget.style.background='rgba(99,102,241,0.85)'; e.currentTarget.style.transform='none'; }}>
            + Add Event
          </button>
        </div>

        {events.length === 0 ? (
          <div style={S.evEmpty}>
            <div style={{ fontSize:'3rem', opacity:0.25 }}>🗓️</div>
            <p style={{ color:'#475569', fontSize:'0.82rem', marginTop:'0.75rem' }}>
              No events yet. Click <strong style={{ color:'#818cf8' }}>+ Add Event</strong> below to start building your timeline.
            </p>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:'0.75rem' }}>
            {events.map(ev => {
              const cardStyle = { ...S.evCard, ...(ev.bookmarked ? S.evBook : S.evNorm) };
              return (
                <div key={ev.id} style={cardStyle}
                  onMouseEnter={e => { if(!ev.bookmarked) e.currentTarget.style.borderColor='rgba(51,65,85,0.8)'; }}
                  onMouseLeave={e => { if(!ev.bookmarked) e.currentTarget.style.borderColor='rgba(30,41,59,0.8)'; }}>
                  {deletingId === ev.id ? (
                    <div style={{
                      position: 'absolute',
                      top: '0.65rem',
                      right: '0.65rem',
                      zIndex: 30,
                      display: 'flex',
                      alignItems: 'center',
                      gap: '0.4rem',
                      background: 'rgba(15, 23, 42, 0.95)',
                      border: '1px solid rgba(239, 68, 68, 0.4)',
                      borderRadius: '0.5rem',
                      padding: '0.35rem 0.55rem',
                      backdropFilter: 'blur(10px)',
                      boxShadow: '0 4px 12px rgba(0,0,0,0.5)'
                    }}>
                      <span style={{ fontSize: '0.65rem', fontWeight: 700, color: '#f87171' }}>Are you sure?</span>
                      <button
                        onClick={() => delEvent(ev.id)}
                        style={{
                          background: '#ef4444',
                          color: '#fff',
                          border: 'none',
                          borderRadius: '0.25rem',
                          padding: '0.2rem 0.45rem',
                          fontSize: '0.65rem',
                          fontWeight: 700,
                          cursor: 'pointer',
                          transition: 'background 0.15s'
                        }}
                        onMouseEnter={e => e.currentTarget.style.background = '#dc2626'}
                        onMouseLeave={e => e.currentTarget.style.background = '#ef4444'}
                      >
                        Yes, Delete
                      </button>
                      <button
                        onClick={() => setDeletingId(null)}
                        style={{
                          background: 'rgba(255, 255, 255, 0.1)',
                          color: '#cbd5e1',
                          border: 'none',
                          borderRadius: '0.25rem',
                          padding: '0.2rem 0.45rem',
                          fontSize: '0.65rem',
                          fontWeight: 700,
                          cursor: 'pointer',
                          transition: 'background 0.15s'
                        }}
                        onMouseEnter={e => e.currentTarget.style.background = 'rgba(255, 255, 255, 0.2)'}
                        onMouseLeave={e => e.currentTarget.style.background = 'rgba(255, 255, 255, 0.1)'}
                      >
                        Cancel
                      </button>
                    </div>
                  ) : (
                    <button style={S.evDel} onClick={() => setDeletingId(ev.id)}
                      onMouseEnter={e => {
                        e.currentTarget.style.color='#f87171';
                        e.currentTarget.style.background='rgba(239,68,68,0.15)';
                        e.currentTarget.style.borderColor='rgba(239,68,68,0.3)';
                      }}
                      onMouseLeave={e => {
                        e.currentTarget.style.color='#94a3b8';
                        e.currentTarget.style.background='rgba(255,255,255,0.04)';
                        e.currentTarget.style.borderColor='rgba(255,255,255,0.08)';
                      }}>
                      ✕
                    </button>
                  )}
                  <div style={S.evBody}>
                    <button
                      style={{
                        ...S.star,
                        background: ev.bookmarked ? 'rgba(245,158,11,0.12)' : 'rgba(255,255,255,0.03)',
                        borderColor: ev.bookmarked ? 'rgba(245,158,11,0.4)' : 'rgba(255,255,255,0.08)',
                        color: ev.bookmarked ? '#f59e0b' : '#64748b',
                      }}
                      onClick={() => bookmark(ev.id)}
                      onMouseEnter={e => {
                        if (!ev.bookmarked) {
                          e.currentTarget.style.color = '#cbd5e1';
                          e.currentTarget.style.background = 'rgba(255,255,255,0.08)';
                          e.currentTarget.style.borderColor = 'rgba(255,255,255,0.2)';
                        }
                      }}
                      onMouseLeave={e => {
                        if (!ev.bookmarked) {
                          e.currentTarget.style.color = '#64748b';
                          e.currentTarget.style.background = 'rgba(255,255,255,0.03)';
                          e.currentTarget.style.borderColor = 'rgba(255,255,255,0.08)';
                        }
                      }}>
                      ★
                    </button>
                    <div style={S.evInfo}>
                      <div style={{ display:'flex', alignItems:'center', flexWrap:'wrap' }}>
                        <span style={{ ...S.evName, color: ev.bookmarked ? '#fef3c7' : '#f1f5f9' }}>{ev.name}</span>
                        {ev.bookmarked && <span style={S.priBadge}>Priority</span>}
                      </div>
                      <div style={{ ...S.evDate, color: ev.bookmarked ? 'rgba(245,158,11,0.65)' : 'rgba(99,102,241,0.75)' }}>
                        📅 {calFmtDate(ev.date)}
                      </div>
                      {ev.description && <div style={S.evDesc}>{ev.description}</div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Add Event Modal */}
      {showModal && (
        <div style={S.overlay} onClick={e => e.target===e.currentTarget && setShowModal(false)}>
          <div style={S.modal}>
            <h3 style={{ fontSize:'1.1rem', fontWeight:900, color:'#f8fafc', margin:'0 0 0.3rem', letterSpacing:'-0.02em' }}>Add New Event</h3>
            <p style={{ fontSize:'0.75rem', color:'#475569', margin:'0 0 1.5rem' }}>Mark a personal milestone or upcoming academic date.</p>
            <form onSubmit={addEvent} style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
              <div>
                <label style={S.lbl}>Event Name <span style={{ color:'#f87171' }}>*</span></label>
                <input type="text" required placeholder="e.g. End-Semester Examination"
                  value={form.name} onChange={e => setForm(p => ({ ...p, name:e.target.value }))} style={S.mInp}/>
              </div>
              <div>
                <label style={S.lbl}>Date <span style={{ color:'#f87171' }}>*</span></label>
                <input type="date" required
                  value={form.date} onChange={e => setForm(p => ({ ...p, date:e.target.value }))} style={{ ...S.mInp, cursor:'pointer' }}/>
              </div>
              <div>
                <label style={S.lbl}>Description <span style={{ color:'#334155', fontWeight:400, textTransform:'none' }}>(optional)</span></label>
                <textarea rows={3} placeholder="Add notes, location, or details…"
                  value={form.description} onChange={e => setForm(p => ({ ...p, description:e.target.value }))}
                  style={{ ...S.mInp, resize:'none' }}/>
              </div>
              <div style={S.mBtns}>
                <button type="button" onClick={() => setShowModal(false)} style={S.mCancel}>Cancel</button>
                <button type="submit" style={S.mCreate}>Create Event</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Sub-Component 1: PDF Vault (UI Only) ─────────────────────────────── */
function PdfVault({ user }) {
  const storageKey = `studentos_vault_${user?.email || 'guest'}`;
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ title: '', subject: '' });
  const [selectedFile, setSelectedFile] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [previewDoc, setPreviewDoc] = useState(null);
  const fileInputRef = useRef(null);

  const fetchDocs = async () => {
    if (!user?.email) {
      setLoading(false);
      return;
    }
    const start = Date.now();
    try {
      setLoading(true);
      const res = await fetch(`${API_BASE}/api/vault/${user.email}`);
      if (res.ok) {
        const data = await res.json();
        const elapsed = Date.now() - start;
        if (elapsed < 500) await new Promise(r => setTimeout(r, 500 - elapsed));
        setDocs(data || []);
      }
    } catch (e) {
      console.error(e);
      try {
        const s = localStorage.getItem(storageKey);
        setDocs(s ? JSON.parse(s) : []);
      } catch { setDocs([]); }
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchDocs();
  }, [user?.email]);

  const handleFileSelect = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const validTypes = ['application/pdf', 'image/png', 'image/jpeg', 'image/gif', 'image/webp', 'image/svg+xml'];
    if (!validTypes.includes(file.type)) {
      alert('Only PDF and image files (PNG, JPG, GIF, WebP, SVG) are supported.');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      alert('File must be under 5 MB.');
      return;
    }
    setSelectedFile(file);
    if (!form.title) setForm(p => ({ ...p, title: file.name.replace(/\.[^/.]+$/, '') }));
  };

  const handleAdd = async (e) => {
    e.preventDefault();
    if (!form.title || !selectedFile) return;
    if (!user?.email) {
      alert("Please sign in to upload files.");
      return;
    }
    setUploading(true);

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('title', form.title);
    formData.append('subject', form.subject || 'General');

    try {
      const res = await fetch(`${API_BASE}/api/vault/upload/${user.email}`, {
        method: 'POST',
        body: formData
      });
      if (res.ok) {
        setForm({ title: '', subject: '' });
        setSelectedFile(null);
        setShowModal(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
        fetchDocs();
      } else {
        const errData = await res.json();
        alert(`Upload failed: ${errData.detail || 'unknown error'}`);
      }
    } catch (err) {
      console.error(err);
      alert('Upload failed due to network error.');
    } finally {
      setUploading(false);
    }
  };

  const handleDelete = async (id) => {
    if (!window.confirm('Are you sure you want to remove this document?')) return;
    if (!user?.email) return;
    try {
      const res = await fetch(`${API_BASE}/api/vault/${user.email}/${id}`, {
        method: 'DELETE'
      });
      if (res.ok) {
        fetchDocs();
        if (previewDoc?.id === id) setPreviewDoc(null);
      }
    } catch (e) {
      console.error(e);
    }
  };

  const handleDownload = (doc) => {
    const a = document.createElement('a');
    a.href = doc.dataUrl; a.target = "_blank";
    a.download = doc.fileName || doc.title;
    a.click();
  };

  const formatSize = (bytes) => {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  };

  const isImage = (type) => type && type.startsWith('image/');

  const PS = {
    inp: { width:'100%', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(108,99,255,0.25)', borderRadius:'0.65rem', padding:'0.7rem 1rem', color:'#e2e8f0', fontSize:'0.82rem', outline:'none', fontFamily:'inherit', boxSizing:'border-box' },
    lbl: { display:'block', fontSize:'0.62rem', fontWeight:700, color:'#5b6080', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.4rem' },
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'1.5rem', height:'100%' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'1rem' }}>
        <div>
          <h2 style={{ margin:0, fontSize:'1.35rem', fontWeight:800, color:'#f8fafc', letterSpacing:'-0.02em' }}>📁 Personal Notes & Journal</h2>
          <p style={{ margin:'0.3rem 0 0', fontSize:'0.78rem', color:'#5b6080' }}>Upload and store your PDFs, images & study material privately</p>
        </div>
        <button onClick={() => setShowModal(true)}
          style={{ display:'flex', alignItems:'center', gap:'0.5rem', padding:'0.6rem 1.2rem', borderRadius:'0.7rem', border:'none', background:'linear-gradient(135deg,#6c63ff,#8b5cf6)', color:'#fff', fontSize:'0.8rem', fontWeight:700, cursor:'pointer', boxShadow:'0 4px 18px rgba(108,99,255,0.3)', transition:'all 0.2s' }}
          onMouseEnter={e => { e.currentTarget.style.transform='translateY(-1px)'; e.currentTarget.style.boxShadow='0 8px 28px rgba(108,99,255,0.45)'; }}
          onMouseLeave={e => { e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='0 4px 18px rgba(108,99,255,0.3)'; }}>
          ⬆️ Upload File
        </button>
      </div>

      {/* Cards Grid */}
      {loading ? (
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'1rem', minHeight:'300px' }}>
          <svg width="48" height="48" viewBox="0 0 50 50" style={{ color:'#8b5cf6', filter:'drop-shadow(0 0 8px rgba(139,92,246,0.45))' }}>
            <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeDasharray="80 200">
              <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
            </circle>
          </svg>
          <span style={{ fontSize:'0.82rem', color:'#94a3b8', fontWeight:600, letterSpacing:'0.04em' }}>Syncing private notes with cloud…</span>
        </div>
      ) : docs.length === 0 ? (
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'1rem', padding:'3rem', borderRadius:'1rem', border:'2px dashed rgba(108,99,255,0.15)', background:'rgba(255,255,255,0.01)' }}>
          <span style={{ fontSize:'3rem', opacity:0.5 }}>📄</span>
          <p style={{ color:'#475569', fontSize:'0.85rem', textAlign:'center', margin:0 }}>No files uploaded yet.<br/>Click "Upload File" to store your first document.</p>
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'1rem', overflowY:'auto', flex:1, paddingBottom:'1rem' }} className="todo-scroll">
          {docs.map(doc => (
            <div key={doc.id} style={{ background:'rgba(22,25,41,0.9)', border:'1px solid rgba(42,47,82,0.7)', borderRadius:'1rem', padding:'1.25rem', display:'flex', flexDirection:'column', gap:'0.75rem', transition:'all 0.2s', position:'relative' }}
              onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(108,99,255,0.4)'; e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,0.3)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(42,47,82,0.7)'; e.currentTarget.style.boxShadow='none'; }}>
              {/* Delete btn */}
              <button onClick={() => handleDelete(doc.id)}

                onMouseLeave={e => { e.currentTarget.style.color='#94a3b8'; e.currentTarget.style.background='rgba(239,68,68,0.08)'; }}>
                ✕
              </button>

              {/* Thumbnail / Icon */}
              <div style={{ width:'100%', height:'120px', borderRadius:'0.65rem', overflow:'hidden', background:'rgba(15,23,42,0.5)', border:'1px solid rgba(42,47,82,0.4)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                {isImage(doc.fileType) ? (
                  <img src={doc.dataUrl} alt={doc.title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                ) : (
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'0.3rem' }}>
                    <span style={{ fontSize:'2.5rem' }}>📄</span>
                    <span style={{ fontSize:'0.6rem', color:'#64748b', fontWeight:700, textTransform:'uppercase' }}>PDF</span>
                  </div>
                )}
              </div>

              <div style={{ minWidth:0 }}>
                <p style={{ margin:0, fontSize:'0.88rem', fontWeight:700, color:'#e8eaf8', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{doc.title}</p>
                <div style={{ display:'flex', alignItems:'center', gap:'0.5rem', marginTop:'0.2rem' }}>
                  <span style={{ fontSize:'0.68rem', color:'#6366f1', fontWeight:600 }}>{doc.subject}</span>
                  <span style={{ fontSize:'0.55rem', color:'#3d4264' }}>•</span>
                  <span style={{ fontSize:'0.62rem', color:'#475569' }}>{formatSize(doc.fileSize)}</span>
                </div>
              </div>

              <div style={{ display:'flex', gap:'0.5rem', marginTop:'auto' }}>
                <button onClick={() => setPreviewDoc(doc)}
                  style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:'0.35rem', padding:'0.5rem', borderRadius:'0.5rem', background:'rgba(108,99,255,0.1)', border:'1px solid rgba(108,99,255,0.25)', color:'#a78bfa', fontSize:'0.72rem', fontWeight:700, cursor:'pointer', transition:'all 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background='rgba(108,99,255,0.2)'}
                  onMouseLeave={e => e.currentTarget.style.background='rgba(108,99,255,0.1)'}>
                  👁️ View
                </button>
                <button onClick={() => handleDownload(doc)}
                  style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:'0.35rem', padding:'0.5rem', borderRadius:'0.5rem', background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.25)', color:'#34d399', fontSize:'0.72rem', fontWeight:700, cursor:'pointer', transition:'all 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background='rgba(52,211,153,0.18)'}
                  onMouseLeave={e => e.currentTarget.style.background='rgba(52,211,153,0.08)'}>
                  ⬇️ Download
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Upload Modal */}
      {showModal && (
        <div style={{ position:'fixed', inset:0, zIndex:1200, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.8)', backdropFilter:'blur(12px)', padding:'1rem' }} onClick={e => e.target === e.currentTarget && setShowModal(false)}>
          <div style={{ width:'100%', maxWidth:'460px', background:'rgba(15,23,42,0.97)', border:'1px solid rgba(51,65,85,0.6)', borderRadius:'1.5rem', padding:'2rem', boxShadow:'0 36px 96px rgba(0,0,0,0.7)' }}>
            <h3 style={{ fontSize:'1.1rem', fontWeight:900, color:'#f8fafc', margin:'0 0 0.3rem' }}>Upload File</h3>
            <p style={{ fontSize:'0.75rem', color:'#475569', margin:'0 0 1.5rem' }}>Upload a PDF or image file (max 5 MB). Stored privately in your browser.</p>
            <form onSubmit={handleAdd} style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
              {/* File Drop Zone */}
              <div>
                <label style={PS.lbl}>File <span style={{ color:'#f87171' }}>*</span></label>
                <div onClick={() => fileInputRef.current?.click()}
                  style={{ width:'100%', padding:'1.5rem', borderRadius:'0.75rem', border: selectedFile ? '2px solid rgba(108,99,255,0.5)' : '2px dashed rgba(108,99,255,0.25)', background: selectedFile ? 'rgba(108,99,255,0.06)' : 'rgba(255,255,255,0.02)', cursor:'pointer', textAlign:'center', transition:'all 0.2s', boxSizing:'border-box' }}>

                      <span style={{ fontSize:'1.5rem' }}>{isImage(selectedFile.type) ? '🖼️' : '📄'}</span>
                      <div style={{ textAlign:'left' }}>
                        <p style={{ margin:0, fontSize:'0.82rem', fontWeight:700, color:'#e8eaf8', wordBreak:'break-all' }}>{selectedFile.name}</p>
                        <p style={{ margin:'0.15rem 0 0', fontSize:'0.68rem', color:'#64748b' }}>{formatSize(selectedFile.size)}</p>

                      <p style={{ margin:0, fontSize:'0.78rem', color:'#64748b' }}>Click to select a <strong style={{ color:'#a78bfa' }}>PDF</strong> or <strong style={{ color:'#a78bfa' }}>Image</strong></p>
                      <p style={{ margin:'0.3rem 0 0', fontSize:'0.62rem', color:'#475569' }}>PNG, JPG, GIF, WebP, SVG, PDF — Max 5 MB</p>
                    </div>
                  )}
                  <input ref={fileInputRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.svg,image/*,application/pdf" onChange={handleFileSelect} style={{ display:'none' }} />

                <input type="text" required placeholder="e.g. Fluid Mechanics Notes" value={form.title} onChange={e => setForm(p => ({ ...p, title: e.target.value }))} style={PS.inp} />

              <div>
                <label style={PS.lbl}>Subject / Tag</label>
                <input type="text" placeholder="e.g. Civil Engineering" value={form.subject} onChange={e => setForm(p => ({ ...p, subject: e.target.value }))} style={PS.inp} />

                <p style={{ margin:'0.2rem 0 0', fontSize:'0.68rem', color:'#5b6080' }}>{previewDoc.subject} · {formatSize(previewDoc.fileSize)}</p>
              </div>
              <div style={{ display:'flex', gap:'0.5rem', flexShrink:0 }}>
                <button onClick={() => handleDownload(previewDoc)}
                  style={{ padding:'0.5rem 1rem', borderRadius:'0.55rem', border:'1px solid rgba(52,211,153,0.3)', background:'rgba(52,211,153,0.08)', color:'#34d399', fontSize:'0.75rem', fontWeight:700, cursor:'pointer' }}>

                  ✕
                </button>
              </div>
            </div>
            {/* Preview Body */}

              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Sub-Component 2: Scratchpad Editor ──────────────────────────────── */
/* ── Sub-Component 2: Multi-Note Scratchpad Editor (Quill.js) ────────── */
function ScratchpadEditor({ user }) {
  const storageKey = `studentos_scratchpad_notes_${user?.email || 'guest'}`;
  const [notes, setNotes] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [saved, setSaved] = useState(true);
  const [loading, setLoading] = useState(true);
  
  const timerRef = useRef(null);
  const quillRef = useRef(null);
  const editorContainerRef = useRef(null);

  // Load notes on mount/user change
  useEffect(() => {
    const start = Date.now();
    if (user?.email) {
      setLoading(true);
      fetch(`${API_BASE}/api/private-scratchpad/${user.email}`)
        .then(res => res.json())
        .then(async data => {
          const elapsed = Date.now() - start;
          if (elapsed < 500) await new Promise(r => setTimeout(r, 500 - elapsed));
          setNotes(data || []);
          if (data && data.length > 0) setActiveId(data[0].id);
          setLoading(false);
        })
        .catch(async err => {
          console.error(err);
          let loaded = [];
          try {
            const s = localStorage.getItem(storageKey);
            loaded = s ? JSON.parse(s) : [];
            setNotes(loaded);
          } catch { setNotes([]); }
          if (loaded.length > 0) setActiveId(loaded[0].id);
          const elapsed = Date.now() - start;
          if (elapsed < 500) await new Promise(r => setTimeout(r, 500 - elapsed));
          setLoading(false);
        });
    } else {
      let loaded = [];
      try {
        const s = localStorage.getItem(storageKey);
        loaded = s ? JSON.parse(s) : [];
        setNotes(loaded);
      } catch { setNotes([]); }
      if (loaded.length > 0) setActiveId(loaded[0].id);
      setLoading(false);
    }
  }, [user?.email, storageKey]);

  const activeIdRef = useRef(activeId);
  const emailRef = useRef(user?.email);
  const storageKeyRef = useRef(storageKey);

  useEffect(() => {
    activeIdRef.current = activeId;
    emailRef.current = user?.email;
    storageKeyRef.current = storageKey;
  }, [activeId, user?.email, storageKey]);

  const syncToBackend = (latestNotes) => {
    if (emailRef.current) {
      fetch(`${API_BASE}/api/private-scratchpad/${emailRef.current}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes: latestNotes })
      }).catch(err => console.error("Sync error:", err));
    }
    localStorage.setItem(storageKeyRef.current, JSON.stringify(latestNotes));
  };

  // Load Quill
  useEffect(() => {
    if (activeId && editorContainerRef.current && !quillRef.current && window.Quill) {
      quillRef.current = new window.Quill(editorContainerRef.current, {
        theme: 'snow',
        modules: {
          toolbar: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'list': 'check' }],
            [{ 'indent': '-1' }, { 'indent': '+1' }],
            ['blockquote', 'code-block'],
            ['link'],
            ['clean']
          ]
        },
        placeholder: 'Start typing your notes, ideas, checklists…'
      });
      
      quillRef.current.on('text-change', () => {
        setSaved(false);
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          setNotes(prev => {
            const updated = prev.map(n => 
              n.id === activeIdRef.current ? { ...n, content: quillRef.current.root.innerHTML, updated_at: Date.now() } : n
            );
            syncToBackend(updated);
            return updated;
          });
          setSaved(true);
        }, 1500);
      });
    }

    // Unmount cleanup to prevent multiple instances if activeId changes completely
    // Actually, it's better to keep one Quill instance and just update its content.
    // If Quill is already initialized, we don't recreate it.
  }, [activeId]);

  // Sync Quill content when switching notes
  useEffect(() => {
    if (activeId && quillRef.current) {
      const activeNote = notes.find(n => n.id === activeId);
      if (activeNote && quillRef.current.root.innerHTML !== activeNote.content) {
        // Prevent triggering the text-change event to avoid infinite loop
        const delta = quillRef.current.clipboard.convert(activeNote.content || '');
        quillRef.current.setContents(delta, 'silent');
      }
    }
  }, [activeId]); // purposefully not including notes to prevent reset on every keystroke

  // Cleanup Quill on unmount
  useEffect(() => {
    return () => {
      if (quillRef.current) {
        quillRef.current = null;
      }
    };
  }, []);

  const handleCreate = () => {
    const newNote = { id: Date.now().toString(), title: 'Untitled Note', content: '', updated_at: Date.now() };
    setNotes(prev => {
      const updated = [newNote, ...prev];
      syncToBackend(updated);
      return updated;
    });
    setActiveId(newNote.id);
  };

  const handleDelete = (id, e) => {
    e.stopPropagation();
    if (!window.confirm('Delete this note?')) return;
    setNotes(prev => {
      const updated = prev.filter(n => n.id !== id);
      syncToBackend(updated);
      return updated;
    });
    if (activeIdRef.current === id) setActiveId(null);
  };

  const handleTitleChange = (val) => {
    // 1. Update React state immediately so input is responsive
    setNotes(prev => prev.map(n => n.id === activeIdRef.current ? { ...n, title: val, updated_at: Date.now() } : n));
    
    // 2. Debounce database sync
    setSaved(false);
    if (timerRef.current) clearTimeout(timerRef.current);
    
    timerRef.current = setTimeout(() => {
      setNotes(prev => {
        syncToBackend(prev);
        return prev;
      });
      setSaved(true);
    }, 1500);
  };

  const activeNote = notes.find(n => n.id === activeId);

  return (
    <div className="layout-main" style={{ display:'flex', gap:'1.25rem', height:'100%', minHeight:'500px' }}>
      {/* Left Sidebar */}
      <div className="sidebar-aside" style={{ width:'260px', display:'flex', flexDirection:'column', gap:'1rem', borderRight:'1px solid rgba(42,47,82,0.5)', paddingRight:'1.25rem' }}>
        <button onClick={handleCreate}
          style={{ width:'100%', padding:'0.7rem', borderRadius:'0.7rem', border:'none', background:'linear-gradient(135deg,#6c63ff,#8b5cf6)', color:'#fff', fontSize:'0.85rem', fontWeight:800, cursor:'pointer', boxShadow:'0 4px 18px rgba(108,99,255,0.3)' }}>
          + New Note
        </button>
        <div className="notes-list-scroll todo-scroll" style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:'0.5rem' }}>
          {notes.sort((a,b) => b.updated_at - a.updated_at).map(n => (
            <div key={n.id} onClick={() => setActiveId(n.id)}
              style={{ padding:'0.75rem', borderRadius:'0.6rem', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between',
                background: activeId === n.id ? 'rgba(108,99,255,0.15)' : 'rgba(15,23,42,0.4)',
                border: activeId === n.id ? '1px solid rgba(108,99,255,0.35)' : '1px solid rgba(42,47,82,0.4)',
                transition:'all 0.2s'
              }}>
              <span style={{ fontSize:'0.82rem', fontWeight:600, color: activeId === n.id ? '#e8eaf8' : '#94a3b8', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1 }}>
                {n.title || 'Untitled'}
              </span>
              <button onClick={(e) => handleDelete(n.id, e)}
                style={{ background:'transparent', border:'none', color:'#f43f5e', cursor:'pointer', padding:'0.2rem', opacity: activeId === n.id ? 1 : 0.6 }}>
                🗑️
              </button>
            </div>
          ))}
          {notes.length === 0 && <p style={{ color:'#64748b', fontSize:'0.8rem', textAlign:'center', marginTop:'2rem' }}>No notes yet.</p>}
        </div>
      </div>

      {/* Right Canvas */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'1rem', minWidth:0 }}>
        {loading ? (
          <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'1rem' }}>
            <svg width="48" height="48" viewBox="0 0 50 50" style={{ color:'#8b5cf6', filter:'drop-shadow(0 0 8px rgba(139,92,246,0.45))' }}>
              <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeDasharray="80 200">
                <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
              </circle>
            </svg>
            <span style={{ fontSize:'0.82rem', color:'#94a3b8', fontWeight:600, letterSpacing:'0.04em' }}>Syncing with cloud…</span>
          </div>
        ) : !activeNote ? (
          <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:'1rem', opacity:0.6 }}>
            <span style={{ fontSize:'3rem' }}>📝</span>
            <p style={{ color:'#94a3b8', fontSize:'0.9rem' }}>Select or create a note to begin writing</p>
          </div>
        ) : (
          <>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <input type="text" value={activeNote.title} onChange={e => handleTitleChange(e.target.value)}
                placeholder="Note Title"
                style={{ flex:1, background:'transparent', border:'none', outline:'none', color:'#f8fafc', fontSize:'1.4rem', fontWeight:800, padding:'0.5rem 0' }} />
              
              <span style={{ fontSize:'0.68rem', fontWeight:600, color: saved ? '#4ade80' : '#f59e0b', display:'flex', alignItems:'center', gap:'0.3rem' }}>
                <span style={{ width:'6px', height:'6px', borderRadius:'50%', background: saved ? '#4ade80' : '#f59e0b' }}/>
                {saved ? 'Saved' : 'Saving...'}
              </span>
            </div>
            
            {/* Quill Editor Container */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', background:'rgba(15,23,42,0.6)', border:'1px solid rgba(42,47,82,0.7)', borderRadius:'1rem', overflow:'hidden', minHeight:'300px' }}>
               <div ref={editorContainerRef} style={{ flex:1, border:'none' }} />
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── Sub-Component 3: Focus Countdown Station ──────────────────────── */
function FocusCountdown() {
  const [mode, setMode] = useState('normal'); // normal | pomodoro
  const [timeLeft, setTimeLeft] = useState(0);
  const [isRunning, setIsRunning] = useState(false);
  const [inputTime, setInputTime] = useState({ hours: 0, minutes: 25, seconds: 0 });
  const [pomodoroPhase, setPomodoroPhase] = useState('work'); // work | break
  const [pomodoroCount, setPomodoroCount] = useState(0);
  const [soundPlaying, setSoundPlaying] = useState(null); // null | 'rain' | 'whitenoise' | 'lofi'
  const intervalRef = useRef(null);
  const audioCtxRef = useRef(null);
  const activeAudioNodesRef = useRef(null);

  const getAudioCtx = () => {
    if (!audioCtxRef.current) {
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
    return audioCtxRef.current;
  };

  const stopCurrentSound = () => {
    if (activeAudioNodesRef.current) {
      activeAudioNodesRef.current.forEach(node => {
        try { node.stop && node.stop(); } catch(e) {}
        try { node.disconnect(); } catch(e) {}
      });
      activeAudioNodesRef.current = null;
    }
  };

  const createNoiseBuffer = (ctx) => {
    const size = 2 * ctx.sampleRate;
    const buf = ctx.createBuffer(2, size, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buf.getChannelData(ch);
      for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    }
    return buf;
  };

  const playSound = (key) => {
    stopCurrentSound();
    if (soundPlaying === key) { setSoundPlaying(null); return; }

    const ctx = getAudioCtx();
    const source = ctx.createBufferSource();
    source.buffer = createNoiseBuffer(ctx);
    source.loop = true;
    const gain = ctx.createGain();
    const allNodes = [source];

    if (key === 'rain') {
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 60;
      gain.gain.value = 0.30;
      source.connect(lp); lp.connect(hp); hp.connect(gain);
    } else if (key === 'whitenoise') {
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 8000;
      gain.gain.value = 0.10;
      source.connect(lp); lp.connect(gain);
    } else if (key === 'lofi') {
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 3;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 100;
      gain.gain.value = 0.18;
      source.connect(lp); lp.connect(hp); hp.connect(gain);
    }

    gain.connect(ctx.destination);
    source.start();
    activeAudioNodesRef.current = [source, gain];
    setSoundPlaying(key);
  };

  useEffect(() => {
    return () => {
      stopCurrentSound();
      if (audioCtxRef.current) { try { audioCtxRef.current.close(); } catch(e) {} }
      if (intervalRef.current) clearInterval(intervalRef.current);
    };
  }, []);

  useEffect(() => {
    if (isRunning && timeLeft > 0) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(prev => {
          if (prev <= 1) {
            clearInterval(intervalRef.current);
            setIsRunning(false);
            if (mode === 'pomodoro') {
              if (pomodoroPhase === 'work') {
                setPomodoroPhase('break');
                setPomodoroCount(c => c + 1);
                return 5 * 60; // 5 min break
              } else {
                setPomodoroPhase('work');
                return 25 * 60; // 25 min work
              }
            }
            return 0;
          }
          return prev - 1;
        });
      }, 1000);
    }
    return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, [isRunning, timeLeft, mode, pomodoroPhase]);

  const startTimer = () => {
    if (timeLeft === 0) {
      if (mode === 'normal') {
        const total = inputTime.hours * 3600 + inputTime.minutes * 60 + inputTime.seconds;
        if (total <= 0) return;
        setTimeLeft(total);
      } else {
        setTimeLeft(25 * 60);
        setPomodoroPhase('work');
        setPomodoroCount(0);
      }
    }
    setIsRunning(true);
  };

  const pauseTimer = () => setIsRunning(false);
  const resetTimer = () => {
    setIsRunning(false);
    setTimeLeft(0);
    setPomodoroPhase('work');
    setPomodoroCount(0);
    if (intervalRef.current) clearInterval(intervalRef.current);
  };


  const formatTime = (secs) => {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  const progress = mode === 'pomodoro'
    ? (pomodoroPhase === 'work' ? (1 - timeLeft / (25 * 60)) : (1 - timeLeft / (5 * 60)))
    : (inputTime.hours * 3600 + inputTime.minutes * 60 + inputTime.seconds > 0
       ? (1 - timeLeft / (inputTime.hours * 3600 + inputTime.minutes * 60 + inputTime.seconds))
       : 0);

  const accentColor = pomodoroPhase === 'break' ? '#4ade80' : '#6c63ff';
  const circumference = 2 * Math.PI * 120;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'1.5rem', height:'100%' }}>
      {/* Header */}
      <div>
        <h2 style={{ margin:0, fontSize:'1.35rem', fontWeight:800, color:'#f8fafc', letterSpacing:'-0.02em' }}>⏱️ Focus Countdown Station</h2>
        <p style={{ margin:'0.3rem 0 0', fontSize:'0.78rem', color:'#5b6080' }}>Stay focused with timed sessions and ambient sounds</p>
      </div>

      {/* Mode Toggle */}
      <div style={{ display:'flex', gap:'0.5rem', background:'rgba(15,23,42,0.6)', padding:'0.35rem', borderRadius:'0.75rem', border:'1px solid rgba(42,47,82,0.5)', alignSelf:'flex-start' }}>
        {[['normal','Normal Timer'],['pomodoro','Pomodoro Mode']].map(([m,l]) => (
          <button key={m} onClick={() => { setMode(m); resetTimer(); }}
            style={{ padding:'0.5rem 1.25rem', borderRadius:'0.55rem', border:'none', fontSize:'0.78rem', fontWeight:700, cursor:'pointer', transition:'all 0.2s',
              background: mode===m ? 'linear-gradient(135deg,#6c63ff,#8b5cf6)' : 'transparent',
              color: mode===m ? '#fff' : '#5b6080',
              boxShadow: mode===m ? '0 4px 14px rgba(108,99,255,0.35)' : 'none',
            }}>
            {m === 'pomodoro' ? '🍅 ' : '⏱️ '}{l}
          </button>
        ))}
      </div>

      {/* Timer Display */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'2rem', padding:'2rem 0' }}>
        {/* Circular Progress */}
        <div style={{ position:'relative', width:'260px', height:'260px' }}>
          <svg width="260" height="260" viewBox="0 0 260 260" style={{ transform:'rotate(-90deg)' }}>
            <circle cx="130" cy="130" r="120" fill="none" stroke="rgba(42,47,82,0.4)" strokeWidth="6"/>
            <circle cx="130" cy="130" r="120" fill="none" stroke={accentColor} strokeWidth="6"
              strokeDasharray={circumference}
              strokeDashoffset={circumference * (1 - (progress || 0))}
              strokeLinecap="round"
              style={{ transition:'stroke-dashoffset 0.5s ease, stroke 0.3s' }}/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
            <span style={{ fontSize:'3rem', fontWeight:200, color:'#f8fafc', fontVariantNumeric:'tabular-nums', letterSpacing:'0.05em', fontFamily:'monospace' }}>
              {formatTime(timeLeft)}
            </span>
            {mode === 'pomodoro' && (
              <span style={{ fontSize:'0.72rem', fontWeight:700, color: pomodoroPhase === 'work' ? '#818cf8' : '#4ade80', textTransform:'uppercase', letterSpacing:'0.1em', marginTop:'0.5rem' }}>
                {pomodoroPhase === 'work' ? '🔥 Focus Time' : '☕ Break Time'} {pomodoroCount > 0 && `· Session ${pomodoroCount}`}
              </span>
            )}
          </div>
        </div>

        {/* Normal Timer Input */}
        {mode === 'normal' && !isRunning && timeLeft === 0 && (
          <div style={{ display:'flex', gap:'0.75rem', alignItems:'center' }}>
            {[['hours','H',23],['minutes','M',59],['seconds','S',59]].map(([key,label,max]) => (
              <div key={key} style={{ textAlign:'center' }}>
                <label style={{ display:'block', fontSize:'0.55rem', fontWeight:700, color:'#5b6080', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:'0.3rem' }}>{label}</label>
                <input type="number" min="0" max={max} value={inputTime[key]}
                  onChange={e => setInputTime(p => ({ ...p, [key]: Math.max(0, Math.min(max, parseInt(e.target.value) || 0)) }))}
                  style={{ width:'4rem', textAlign:'center', background:'rgba(15,23,42,0.8)', border:'1px solid rgba(108,99,255,0.3)', borderRadius:'0.6rem', padding:'0.6rem', color:'#e2e8f0', fontSize:'1.2rem', fontWeight:700, fontFamily:'monospace', outline:'none', boxSizing:'border-box' }}/>
              </div>
            ))}
          </div>
        )}

        {/* Controls */}
        <div style={{ display:'flex', gap:'0.75rem' }}>
          {!isRunning ? (
            <button onClick={startTimer}
              style={{ padding:'0.7rem 2.5rem', borderRadius:'0.75rem', border:'none', background:'linear-gradient(135deg,#6c63ff,#8b5cf6)', color:'#fff', fontSize:'0.85rem', fontWeight:800, cursor:'pointer', boxShadow:'0 6px 22px rgba(108,99,255,0.35)', letterSpacing:'0.05em', transition:'all 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.transform='translateY(-1px)'}
              onMouseLeave={e => e.currentTarget.style.transform='none'}>
              {timeLeft > 0 ? '▶ Resume' : '▶ Start'}
            </button>
          ) : (
            <button onClick={pauseTimer}
              style={{ padding:'0.7rem 2.5rem', borderRadius:'0.75rem', border:'1px solid rgba(245,158,11,0.4)', background:'rgba(245,158,11,0.1)', color:'#f59e0b', fontSize:'0.85rem', fontWeight:800, cursor:'pointer', letterSpacing:'0.05em' }}>
              ⏸ Pause
            </button>
          )}
          <button onClick={resetTimer}
            style={{ padding:'0.7rem 1.5rem', borderRadius:'0.75rem', border:'1px solid rgba(71,85,105,0.5)', background:'transparent', color:'#94a3b8', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', transition:'all 0.15s' }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(30,41,59,0.6)'}
            onMouseLeave={e => e.currentTarget.style.background='transparent'}>
            ↻ Reset
          </button>
        </div>
      </div>

      {/* Ambient Sounds */}
      <div style={{ borderTop:'1px solid rgba(42,47,82,0.5)', paddingTop:'1.5rem' }}>
        <h3 style={{ margin:'0 0 1rem', fontSize:'0.82rem', fontWeight:800, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.1em' }}>🎧 Ambient Sounds <span style={{ fontWeight:400, textTransform:'none', letterSpacing:0, fontSize:'0.72rem', color:'#5b6080' }}>(one at a time)</span></h3>
        <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap' }}>
          {[['rain','🌧️','Rain'],['whitenoise','🌊','White Noise'],['lofi','🎵','Lo-fi']].map(([key,emoji,label]) => (
            <button key={key} onClick={() => playSound(key)}
              style={{ display:'flex', alignItems:'center', gap:'0.5rem', padding:'0.6rem 1.2rem', borderRadius:'0.75rem', border: soundPlaying === key ? '1px solid rgba(108,99,255,0.5)' : '1px solid rgba(42,47,82,0.5)', background: soundPlaying === key ? 'rgba(108,99,255,0.12)' : 'rgba(15,23,42,0.4)', color: soundPlaying === key ? '#a78bfa' : '#5b6080', fontSize:'0.78rem', fontWeight:600, cursor:'pointer', transition:'all 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.background = soundPlaying === key ? 'rgba(108,99,255,0.2)' : 'rgba(30,41,59,0.6)'}
              onMouseLeave={e => e.currentTarget.style.background = soundPlaying === key ? 'rgba(108,99,255,0.12)' : 'rgba(15,23,42,0.4)'}>
              <span>{emoji}</span> {label}
              {soundPlaying === key && <span style={{ width:'6px', height:'6px', borderRadius:'50%', background:'#6c63ff', boxShadow:'0 0 8px rgba(108,99,255,0.8)', animation:'pulse 1.5s infinite' }}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
