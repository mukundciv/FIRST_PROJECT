            style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', padding: '0.4rem 0.85rem', borderRadius: '0.55rem', border: '1px solid rgba(108,99,255,0.25)', background: 'rgba(108,99,255,0.08)', color: '#a78bfa', fontSize: '0.78rem', fontWeight: 600, cursor: 'pointer' }}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(108,99,255,0.2)'}
            onMouseLeave={e => e.currentTarget.style.background = 'rgba(108,99,255,0.08)'}>
            ← Dashboard
          </button>
          <span style={{ color: '#3d4264', fontSize: '0.75rem' }}>/</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
            <span style={{ fontSize: '0.85rem' }}>🔒</span>
            <span style={{ fontSize: '0.82rem', fontWeight: 700, color: '#e8eaf8' }}>Private Space</span>
          </div>
        </div>

        {/* Content */}
        <div style={{ flex: 1, padding: '2rem', overflowY: 'auto' }} className="todo-scroll">
          {activeSubTab === 'vault'      && <PdfVault user={user} />}
          {activeSubTab === 'scratchpad' && <ScratchpadEditor user={user} />}
          {activeSubTab === 'focus'      && <FocusCountdown />}
        </div>
      </div>
    </div>
  );
}


/* ── Department Vault Page (Browse & Upload Notes) ──────────────────── */
const DEPARTMENTS = [
  'Civil', 'Computer Science', 'Electronics & Comm.',
  'Electrical', 'Mechanical', 'Chemical',
  'Metallurgy', 'Mining', 'Architecture'
];

const SEMESTERS = [
  'Semester 1', 'Semester 2', 'Semester 3', 'Semester 4',
  'Semester 5', 'Semester 6', 'Semester 7', 'Semester 8'
];

function DepartmentVaultPage({ user, onBack, autoUpload }) {
  const [allNotes, setAllNotes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeDept, setActiveDept] = useState(DEPARTMENTS[0]);
  const [activeSemester, setActiveSemester] = useState(SEMESTERS[0]);
  const [showUpload, setShowUpload] = useState(false);
  const [deptMenuOpen, setDeptMenuOpen] = useState(false);
  const [previewDoc, setPreviewDoc] = useState(null);
  const [form, setForm] = useState({ title: '', subjectCode: '', department: DEPARTMENTS[0], semester: SEMESTERS[0] });
  const [selectedFile, setSelectedFile] = useState(null);
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);

  const isAdmin = user?.email === "bt25civ049@students.vnit.ac.in";

  const fetchNotes = async () => {
    const start = Date.now();
    try {
      setLoading(true);
      const res = await fetch(`${API_BASE}/api/notes/visible/${activeDept}/${activeSemester}?admin_email=${user?.email || ''}`);
      if (res.ok) {
        const data = await res.json();
        const elapsed = Date.now() - start;
        if (elapsed < 500) await new Promise(r => setTimeout(r, 500 - elapsed));
        setAllNotes(data || []);
      }
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchNotes();
  }, [activeDept, activeSemester, user?.email]);

  // Auto-open upload modal if autoUpload prop
  useEffect(() => { if (autoUpload) setShowUpload(true); }, []);

  const visibleNotes = allNotes;
  const filteredNotes = allNotes;

  const handleFileSelect = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const validTypes = ['application/pdf', 'image/png', 'image/jpeg', 'image/gif', 'image/webp'];
    if (!validTypes.includes(file.type)) { alert('Only PDF and image files are supported.'); return; }
    if (file.size > 5 * 1024 * 1024) { alert('File must be under 5 MB.'); return; }
    setSelectedFile(file);
    if (!form.title) setForm(p => ({ ...p, title: file.name.replace(/\.[^/.]+$/, '') }));
  };

  const handleUpload = async (e) => {
    e.preventDefault();
    if (!form.title || !selectedFile) return;
    setUploading(true);
    
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('title', form.title);
    formData.append('subjectCode', form.subjectCode);
    formData.append('department', form.department);
    formData.append('semester', form.semester);
    formData.append('uploadedBy', user?.name || 'Anonymous');

    try {
      const res = await fetch(`${API_BASE}/api/notes/upload`, {
        method: 'POST',
        body: formData
      });
      if (res.ok) {
        setForm({ title: '', subjectCode: '', department: activeDept, semester: activeSemester });
        setSelectedFile(null);
        setShowUpload(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
        alert("Note uploaded successfully! It will become visible once verified by an authorized person.");
        fetchNotes();
      } else {
        const errData = await res.json();
        alert(`Upload failed: ${errData.detail || 'unknown error'}`);
      }
    } catch (err) {
      console.error(err);
      alert('Upload failed due to network error.');
    } finally {
      setUploading(false);
    }
  };

  const handleDelete = async (id) => {
    if (!window.confirm('Delete this note?')) return;
    try {
      const res = await fetch(`${API_BASE}/api/notes/${id}?admin_email=${user?.email || ''}`, {
        method: 'DELETE'
      });
      if (res.ok) {
        fetchNotes();
        if (previewDoc?.id === id) setPreviewDoc(null);
      }
    } catch (err) {
      console.error(err);
    }
  };

  const handleDownload = (doc) => {
    const a = document.createElement('a');
    a.href = doc.dataUrl; a.target = "_blank"; a.download = doc.fileName || doc.title; a.click();
  };

  const formatSize = (b) => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
  const isImage = (t) => t && t.startsWith('image/');

  const PS = {
    inp: { width:'100%', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(108,99,255,0.25)', borderRadius:'0.65rem', padding:'0.7rem 1rem', color:'#e2e8f0', fontSize:'0.82rem', outline:'none', fontFamily:'inherit', boxSizing:'border-box' },
    lbl: { display:'block', fontSize:'0.62rem', fontWeight:700, color:'#5b6080', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.4rem' },
  };

  return (
    <main className="layout-main" style={{ flex:1, display:'flex', minHeight:0 }}>
      {/* Department Sidebar */}
      <aside className="sidebar-aside dept-sidebar todo-scroll" style={{ width:'250px', minWidth:'250px', borderRight:'1px solid rgba(42,47,82,0.5)', background:'rgba(13,15,26,0.5)', backdropFilter:'blur(16px)', display:'flex', flexDirection:'column', overflowY:'auto' }}>
        <div style={{ padding:'1.25rem 1rem 0.75rem' }}>
          <button onClick={onBack}
            style={{ display:'flex', alignItems:'center', gap:'0.4rem', padding:'0.4rem 0.85rem', borderRadius:'0.55rem', border:'1px solid rgba(108,99,255,0.25)', background:'rgba(108,99,255,0.08)', color:'#a78bfa', fontSize:'0.72rem', fontWeight:600, cursor:'pointer', marginBottom:'1rem', width:'100%', justifyContent:'center' }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(108,99,255,0.2)'}
            onMouseLeave={e => e.currentTarget.style.background='rgba(108,99,255,0.08)'}>
            ← Dashboard
          </button>
          <p style={{ margin:0, fontSize:'0.6rem', fontWeight:800, color:'#5b6080', textTransform:'uppercase', letterSpacing:'0.12em' }}>Departments</p>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:'0.2rem', padding:'0.5rem 0.75rem' }}>
          {DEPARTMENTS.map(dept => {
            const isActive = activeDept === dept;
            // Since visibleNotes is now filtered by the backend for safety, we fetch counts dynamically. But to avoid excessive network requests we can count what is currently loaded.
            const count = visibleNotes.filter(n => n.department === dept && n.semester === activeSemester).length;
            return (
              <button key={dept} onClick={() => setActiveDept(dept)}
                style={{ width:'100%', textAlign:'left', padding:'0.65rem 0.85rem', borderRadius:'0.6rem', border:'none', cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', justifyContent:'space-between',
                  background: isActive ? 'rgba(139,85,255,0.12)' : 'transparent',
                  color: isActive ? '#c4b5fd' : '#64748b',
                  fontWeight: isActive ? 700 : 500, fontSize:'0.78rem'
                }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.background='rgba(30,41,59,0.5)'; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background='transparent'; }}>
                <span style={{ whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{dept}</span>
                {count > 0 && <span style={{ fontSize:'0.6rem', background: isActive ? 'rgba(139,85,255,0.2)' : 'rgba(42,47,82,0.5)', padding:'0.15rem 0.45rem', borderRadius:'9999px', fontWeight:700, flexShrink:0, color: isActive ? '#d8b4fe' : '#94a3b8' }}>{count}</span>}
              </button>
            );
          })}
        </div>
      </aside>

      {/* Main Content */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* Top Bar */}
        {/* Top Bar */}
        <div className="vault-top-bar" style={{ borderBottom:'1px solid rgba(42,47,82,0.4)', padding:'1rem 2rem', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'0.75rem', position:'relative' }}>
            <h2 style={{ margin:0, fontSize:'1.25rem', fontWeight:800, color:'#f8fafc', display:'flex', alignItems:'center', gap:'0.5rem' }}>📚 {activeDept}</h2>
            
            {/* Department selector (three dots ⋮) on mobile */}
            <div className="md:hidden" style={{ position: 'relative' }}>
              <button 
                onClick={() => setDeptMenuOpen(!deptMenuOpen)}
                style={{
                  background: 'rgba(108,99,255,0.1)',
                  border: '1px solid rgba(108,99,255,0.3)',
                  color: '#a78bfa',
                  width: '2rem',
                  height: '2rem',
                  borderRadius: '0.5rem',
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '1.25rem',
                  fontWeight: 'bold',
                  outline: 'none'
                }}
              >
                ⋮
              </button>
              
              {deptMenuOpen && (
                <div style={{
                  position: 'absolute',
                  top: '2.5rem',
                  left: 0,
                  background: '#121424',
                  border: '1px solid rgba(108,99,255,0.35)',
                  borderRadius: '0.75rem',
                  boxShadow: '0 12px 36px rgba(0,0,0,0.6)',
                  zIndex: 999,
                  minWidth: '220px',
                  padding: '0.4rem 0',
                }}>
                  {DEPARTMENTS.map(d => (
                    <div 
                      key={d} 
                      onClick={() => { setActiveDept(d); setDeptMenuOpen(false); }}
                      style={{
                        padding: '0.75rem 1.25rem',
                        fontSize: '0.82rem',
                        color: activeDept === d ? '#c4b5fd' : '#94a3b8',
                        background: activeDept === d ? 'rgba(139,85,255,0.12)' : 'transparent',
                        cursor: 'pointer',
                        fontWeight: activeDept === d ? 700 : 500
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}
                      onMouseLeave={e => e.currentTarget.style.background = activeDept === d ? 'rgba(139,85,255,0.12)' : 'transparent'}
                    >
                      {d}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          
          <div className="vault-info-subtitle">
            <p style={{ margin:'0.2rem 0 0', fontSize:'0.72rem', color:'#5b6080' }}>{filteredNotes.length} note{filteredNotes.length !== 1 ? 's' : ''} uploaded for {activeSemester}</p>
          </div>

          <button onClick={() => { setForm(p => ({ ...p, department: activeDept, semester: activeSemester })); setShowUpload(true); }}
            className="vault-upload-btn"
            style={{ display:'flex', alignItems:'center', gap:'0.5rem', padding:'0.6rem 1.2rem', borderRadius:'0.7rem', border:'none', background:'linear-gradient(135deg,#6c63ff,#8b5cf6)', color:'#fff', fontSize:'0.8rem', fontWeight:700, cursor:'pointer', boxShadow:'0 4px 18px rgba(108,99,255,0.3)', transition:'all 0.2s' }}
            onMouseEnter={e => { e.currentTarget.style.transform='translateY(-1px)'; e.currentTarget.style.boxShadow='0 8px 28px rgba(108,99,255,0.45)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='0 4px 18px rgba(108,99,255,0.3)'; }}>
            📤 Upload Note
          </button>
        </div>

        {/* Semester Tabs */}
        <div style={{ padding:'0.75rem 2rem', display:'flex', gap:'0.5rem', overflowX:'auto', borderBottom:'1px solid rgba(42,47,82,0.4)', background:'rgba(13,15,26,0.3)' }} className="todo-scroll">
          {SEMESTERS.map(sem => {
            const isSemActive = activeSemester === sem;
            return (
              <button key={sem} onClick={() => setActiveSemester(sem)}
                style={{ flexShrink:0, padding:'0.5rem 1rem', borderRadius:'9999px', border:'none', fontSize:'0.75rem', fontWeight:600, cursor:'pointer', transition:'all 0.15s',
                  background: isSemActive ? '#6c63ff' : 'rgba(255,255,255,0.03)',
                  color: isSemActive ? '#fff' : '#94a3b8'
                }}
                onMouseEnter={e => { if(!isSemActive) e.currentTarget.style.background='rgba(255,255,255,0.08)' }}
                onMouseLeave={e => { if(!isSemActive) e.currentTarget.style.background='rgba(255,255,255,0.03)' }}>
                {sem}
              </button>
            )
          })}
        </div>

        {/* Notes Grid */}
        <div style={{ flex:1, overflowY:'auto', padding:'1.5rem 2rem' }} className="todo-scroll">
          {loading ? (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'1rem', minHeight:'300px', height:'100%' }}>
              <svg width="48" height="48" viewBox="0 0 50 50" style={{ color:'#8b5cf6', filter:'drop-shadow(0 0 8px rgba(139,92,246,0.45))' }}>
                <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeDasharray="80 200">
                  <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                </circle>
              </svg>
              <span style={{ fontSize:'0.82rem', color:'#94a3b8', fontWeight:600, letterSpacing:'0.04em' }}>Fetching approved notes…</span>
            </div>
          ) : filteredNotes.length === 0 ? (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'1rem', padding:'4rem 2rem', borderRadius:'1rem', border:'2px dashed rgba(108,99,255,0.15)', background:'rgba(255,255,255,0.01)' }}>
              <span style={{ fontSize:'3rem', opacity:0.4 }}>📂</span>
              <p style={{ color:'#475569', fontSize:'0.85rem', textAlign:'center', margin:0 }}>No notes in <strong style={{ color:'#a78bfa' }}>{activeDept} - {activeSemester}</strong> yet.<br/>Be the first to upload!</p>
            </div>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))', gap:'1rem' }}>
              {filteredNotes.map(doc => (
                <div key={doc.id} style={{ background:'rgba(22,25,41,0.9)', border:'1px solid rgba(42,47,82,0.7)', borderRadius:'1rem', padding:'1.1rem', display:'flex', flexDirection:'column', gap:'0.65rem', transition:'all 0.2s', position:'relative' }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(108,99,255,0.4)'; e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,0.3)'; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(42,47,82,0.7)'; e.currentTarget.style.boxShadow='none'; }}>
                  { isAdmin && (
                    <button onClick={() => handleDelete(doc.id)}
                      style={{ position:'absolute', top:'0.65rem', right:'0.65rem', width:'1.5rem', height:'1.5rem', borderRadius:'0.35rem', display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(239,68,68,0.08)', border:'1px solid rgba(239,68,68,0.15)', color:'#94a3b8', cursor:'pointer', fontSize:'0.7rem', transition:'all 0.15s', zIndex:5 }}
                      onMouseEnter={e => { e.currentTarget.style.color='#f87171'; e.currentTarget.style.background='rgba(239,68,68,0.2)'; }}
                      onMouseLeave={e => { e.currentTarget.style.color='#94a3b8'; e.currentTarget.style.background='rgba(239,68,68,0.08)'; }}>
                      ✕
                    </button>
                  )}
                  {doc.status === 'pending' && (
                    <div style={{ position:'absolute', top:'0.65rem', left:'0.65rem', padding:'0.2rem 0.5rem', borderRadius:'0.35rem', background:'rgba(245,158,11,0.2)', border:'1px solid rgba(245,158,11,0.4)', color:'#fbbf24', fontSize:'0.55rem', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.05em', zIndex:5 }}>
                      Pending Review
                    </div>
                  )}
                  <div style={{ width:'100%', height:'100px', borderRadius:'0.6rem', overflow:'hidden', background:'rgba(15,23,42,0.5)', border:'1px solid rgba(42,47,82,0.3)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    {isImage(doc.fileType) ? (
                      <img src={doc.dataUrl} alt={doc.title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                    ) : (
                      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'0.2rem' }}>
                        <span style={{ fontSize:'2rem' }}>📄</span>
                        <span style={{ fontSize:'0.55rem', color:'#64748b', fontWeight:700 }}>PDF</span>
                      </div>
                    )}
                  </div>
                  <div>
                    <p style={{ margin:0, fontSize:'0.82rem', fontWeight:700, color:'#e8eaf8', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{doc.title}</p>
                    <div style={{ display:'flex', alignItems:'center', gap:'0.4rem', marginTop:'0.15rem' }}>
                      <span style={{ fontSize:'0.62rem', color:'#64748b' }}>{formatSize(doc.fileSize)}</span>
                      <span style={{ fontSize:'0.5rem', color:'#3d4264' }}>•</span>
                      {doc.subjectCode && (
                        <>
                          <span style={{ fontSize:'0.62rem', fontWeight:600, color:'#a78bfa' }}>{doc.subjectCode}</span>
                          <span style={{ fontSize:'0.5rem', color:'#3d4264' }}>•</span>
                        </>
                      )}
                      <span style={{ fontSize:'0.62rem', color:'#64748b' }}>by {doc.uploadedBy}</span>
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:'0.4rem', marginTop:'auto' }}>
                    <button onClick={() => setPreviewDoc(doc)}
                      style={{ flex:1, padding:'0.45rem', borderRadius:'0.45rem', background:'rgba(108,99,255,0.1)', border:'1px solid rgba(108,99,255,0.25)', color:'#a78bfa', fontSize:'0.7rem', fontWeight:700, cursor:'pointer', transition:'all 0.15s' }}
                      onMouseEnter={e => e.currentTarget.style.background='rgba(108,99,255,0.2)'}
                      onMouseLeave={e => e.currentTarget.style.background='rgba(108,99,255,0.1)'}>
                      👁️ View
                    </button>
                    <button onClick={() => handleDownload(doc)}
                      style={{ flex:1, padding:'0.45rem', borderRadius:'0.45rem', background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.25)', color:'#34d399', fontSize:'0.7rem', fontWeight:700, cursor:'pointer', transition:'all 0.15s' }}
                      onMouseEnter={e => e.currentTarget.style.background='rgba(52,211,153,0.18)'}
                      onMouseLeave={e => e.currentTarget.style.background='rgba(52,211,153,0.08)'}>
                      ⬇️ Download
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Upload Modal */}
      {showUpload && (
        <div style={{ position:'fixed', inset:0, zIndex:1200, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.8)', backdropFilter:'blur(12px)', padding:'1rem' }} onClick={e => e.target === e.currentTarget && setShowUpload(false)}>
          <div style={{ width:'100%', maxWidth:'480px', background:'rgba(15,23,42,0.97)', border:'1px solid rgba(51,65,85,0.6)', borderRadius:'1.5rem', padding:'2rem', boxShadow:'0 36px 96px rgba(0,0,0,0.7)' }}>
            <h3 style={{ fontSize:'1.1rem', fontWeight:900, color:'#f8fafc', margin:'0 0 0.3rem' }}>📤 Upload Note</h3>
            <p style={{ fontSize:'0.75rem', color:'#475569', margin:'0 0 1.5rem' }}>Share your notes with other students. PDF & images accepted (max 5 MB).</p>
            <form onSubmit={handleUpload} style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
              <div>
                <label style={PS.lbl}>File <span style={{ color:'#f87171' }}>*</span></label>
                <div onClick={() => fileInputRef.current?.click()}
                  style={{ width:'100%', padding:'1.25rem', borderRadius:'0.75rem', border: selectedFile ? '2px solid rgba(108,99,255,0.5)' : '2px dashed rgba(108,99,255,0.25)', background: selectedFile ? 'rgba(108,99,255,0.06)' : 'rgba(255,255,255,0.02)', cursor:'pointer', textAlign:'center', transition:'all 0.2s', boxSizing:'border-box' }}>
                  {selectedFile ? (
                    <div style={{ display:'flex', alignItems:'center', gap:'0.75rem', justifyContent:'center' }}>
                      <span style={{ fontSize:'1.4rem' }}>{isImage(selectedFile.type) ? '🖼️' : '📄'}</span>
                      <div style={{ textAlign:'left' }}>
                        <p style={{ margin:0, fontSize:'0.82rem', fontWeight:700, color:'#e8eaf8', wordBreak:'break-all' }}>{selectedFile.name}</p>
                        <p style={{ margin:'0.1rem 0 0', fontSize:'0.65rem', color:'#64748b' }}>{formatSize(selectedFile.size)}</p>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <span style={{ fontSize:'1.8rem', display:'block', marginBottom:'0.4rem' }}>📂</span>
                      <p style={{ margin:0, fontSize:'0.78rem', color:'#64748b' }}>Click to select a <strong style={{ color:'#a78bfa' }}>PDF</strong> or <strong style={{ color:'#a78bfa' }}>Image</strong></p>
                    </div>
                  )}
                  <input ref={fileInputRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,image/*,application/pdf" onChange={handleFileSelect} style={{ display:'none' }} />
                </div>
              </div>
              <div>
                <label style={PS.lbl}>Title <span style={{ color:'#f87171' }}>*</span></label>
                <input type="text" required placeholder="e.g. Fluid Mechanics Unit 3 Notes" value={form.title} onChange={e => setForm(p => ({ ...p, title: e.target.value }))} style={PS.inp} />
              </div>
              <div>
                <label style={PS.lbl}>Subject Code <span style={{ color:'#f87171' }}>*</span></label>
                <input type="text" required placeholder="e.g. CIV101" value={form.subjectCode} onChange={e => setForm(p => ({ ...p, subjectCode: e.target.value }))} style={PS.inp} />
              </div>
              <div>
                <label style={PS.lbl}>Department <span style={{ color:'#f87171' }}>*</span></label>
                <select value={form.department} onChange={e => setForm(p => ({ ...p, department: e.target.value }))} style={{ ...PS.inp, cursor:'pointer', appearance:'auto' }}>
                  {DEPARTMENTS.map(d => <option key={d} value={d} style={{ background: '#1a1e35', color: '#e8eaf8' }}>{d}</option>)}
                </select>
              </div>
              <div>
                <label style={PS.lbl}>Semester <span style={{ color:'#f87171' }}>*</span></label>
                <select value={form.semester} onChange={e => setForm(p => ({ ...p, semester: e.target.value }))} style={{ ...PS.inp, cursor:'pointer', appearance:'auto' }}>
                  {SEMESTERS.map(s => <option key={s} value={s} style={{ background: '#1a1e35', color: '#e8eaf8' }}>{s}</option>)}
                </select>
              </div>
              <div style={{ display:'flex', gap:'0.75rem', marginTop:'0.5rem' }}>
                <button type="button" onClick={() => { setShowUpload(false); setSelectedFile(null); setForm({ title:'', subjectCode: '', department: activeDept, semester: activeSemester }); }} style={{ flex:1, padding:'0.8rem', borderRadius:'0.7rem', border:'1px solid rgba(71,85,105,0.5)', background:'transparent', color:'#94a3b8', fontSize:'0.82rem', fontWeight:600, cursor:'pointer' }}>Cancel</button>
                <button type="submit" disabled={uploading || !selectedFile} style={{ flex:1, padding:'0.8rem', borderRadius:'0.7rem', border:'none', background: uploading || !selectedFile ? 'rgba(108,99,255,0.3)' : 'linear-gradient(135deg,#6c63ff,#8b5cf6)', color:'#fff', fontSize:'0.82rem', fontWeight:800, cursor: uploading || !selectedFile ? 'not-allowed' : 'pointer', boxShadow:'0 6px 20px rgba(108,99,255,0.28)', opacity: uploading || !selectedFile ? 0.6 : 1 }}>{uploading ? 'Uploading...' : 'Upload Note'}</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Preview Modal */}
      {previewDoc && (
        <div style={{ position:'fixed', inset:0, zIndex:1300, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.85)', backdropFilter:'blur(16px)', padding:'1rem' }} onClick={e => e.target === e.currentTarget && setPreviewDoc(null)}>
          <div style={{ width:'100%', maxWidth:'800px', maxHeight:'90vh', background:'rgba(15,23,42,0.97)', border:'1px solid rgba(51,65,85,0.6)', borderRadius:'1.5rem', display:'flex', flexDirection:'column', overflow:'hidden', boxShadow:'0 36px 96px rgba(0,0,0,0.7)' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'1.25rem 1.5rem', borderBottom:'1px solid rgba(42,47,82,0.5)' }}>
              <div style={{ minWidth:0 }}>
                <h3 style={{ margin:0, fontSize:'1rem', fontWeight:800, color:'#f8fafc', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{previewDoc.title}</h3>
                <p style={{ margin:'0.2rem 0 0', fontSize:'0.68rem', color:'#5b6080' }}>
                  {previewDoc.department} {previewDoc.subjectCode ? `· ${previewDoc.subjectCode}` : ''} · {formatSize(previewDoc.fileSize)} · by {previewDoc.uploadedBy}
                </p>
              </div>
              <div style={{ display:'flex', gap:'0.5rem', flexShrink:0 }}>
                <button onClick={() => handleDownload(previewDoc)}
                  style={{ padding:'0.5rem 1rem', borderRadius:'0.55rem', border:'1px solid rgba(52,211,153,0.3)', background:'rgba(52,211,153,0.08)', color:'#34d399', fontSize:'0.75rem', fontWeight:700, cursor:'pointer' }}>
                  ⬇️ Download
                </button>
                <button onClick={() => setPreviewDoc(null)}
                  style={{ padding:'0.5rem 0.75rem', borderRadius:'0.55rem', border:'1px solid rgba(71,85,105,0.5)', background:'transparent', color:'#94a3b8', fontSize:'0.85rem', cursor:'pointer' }}>
                  ✕
                </button>
              </div>
            </div>
            <div style={{ flex:1, overflow:'auto', display:'flex', alignItems:'center', justifyContent:'center', padding:'1.5rem', background:'rgba(0,0,0,0.2)' }} className="todo-scroll">
              {isImage(previewDoc.fileType) ? (
                <img src={previewDoc.dataUrl} alt={previewDoc.title} style={{ maxWidth:'100%', maxHeight:'70vh', borderRadius:'0.5rem', objectFit:'contain' }} />

}

function AdminNoteApprovalPage({ user, onBack }) {
  const [pendingNotes, setPendingNotes] = useState([]);
  const [previewDoc, setPreviewDoc] = useState(null);
  const [loading, setLoading] = useState(true);

  const fetchPending = async () => {
    try {
      setLoading(true);
      const res = await fetch(`${API_BASE}/api/notes/pending?admin_email=${user?.email || ''}`);
      if (res.ok) {
        const data = await res.json();
        setPendingNotes(data || []);
      }
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchPending();
  }, [user?.email]);

  const handleApprove = async (id) => {
    try {
      const res = await fetch(`${API_BASE}/api/notes/approve/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_email: user?.email })
      });
      if (res.ok) {
        fetchPending();
      }
    } catch (err) {
      console.error(err);
    }
  };

  const handleDelete = async (id) => {
    if (!window.confirm('Reject and delete this note?')) return;
    try {
      const res = await fetch(`${API_BASE}/api/notes/${id}?admin_email=${user?.email || ''}`, {
        method: 'DELETE'
      });
      if (res.ok) {
        fetchPending();
        if (previewDoc?.id === id) setPreviewDoc(null);
      }
    } catch (err) {
      console.error(err);
    }
  };

  const formatSize = (b) => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
  const isImage = (t) => t && t.startsWith('image/');

  return (
    <main style={{ flex:1, maxWidth:'80rem', margin:'0 auto', width:'100%', padding:'0 1rem' }}>
      <div style={{ padding:'1.5rem 0 0.5rem', display:'flex', alignItems:'center', gap:'1rem' }}>
        <button onClick={onBack}
          style={{ display:'flex', alignItems:'center', gap:'0.4rem', padding:'0.5rem 1rem', borderRadius:'0.6rem', border:'1px solid rgba(71,85,105,0.5)', background:'transparent', color:'#94a3b8', fontSize:'0.78rem', fontWeight:600, cursor:'pointer' }}>
          ← Dashboard
        </button>
      </div>
      <div style={{ padding: '1rem 0' }}>
        <h2 style={{ margin:0, fontSize:'1.5rem', fontWeight:800, color:'#f8fafc' }}>Admin: Pending Notes</h2>
        <p style={{ margin:'0.2rem 0 2rem', fontSize:'0.82rem', color:'#94a3b8' }}>Review uploaded notes before they are published.</p>

        {loading ? (
          <p style={{ color: '#94a3b8' }}>Loading pending reviews…</p>
        ) : pendingNotes.length === 0 ? (
          <div style={{ padding: '4rem 2rem', textAlign: 'center', background: 'rgba(255,255,255,0.02)', borderRadius: '1rem', border: '2px dashed rgba(255,255,255,0.1)' }}>
            <span style={{ fontSize: '3rem', opacity: 0.4 }}>🎉</span>
            <p style={{ color: '#94a3b8', marginTop: '1rem' }}>All caught up! No pending notes.</p>
          </div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'1rem' }}>
            {pendingNotes.map(doc => (
              <div key={doc.id} style={{ background:'rgba(22,25,41,0.9)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:'1rem', padding:'1.1rem', display:'flex', flexDirection:'column', gap:'0.65rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: '0.65rem', background: 'rgba(245,158,11,0.15)', color: '#fbbf24', padding: '0.2rem 0.5rem', borderRadius: '0.3rem', fontWeight: 700, textTransform: 'uppercase' }}>Pending</span>
                  <span style={{ fontSize: '0.65rem', color: '#64748b' }}>{new Date(doc.uploadedAt).toLocaleDateString()}</span>
                </div>
                <div>
                  <p style={{ margin:0, fontSize:'0.85rem', fontWeight:700, color:'#e8eaf8', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{doc.title}</p>
                  <p style={{ margin:'0.2rem 0 0', fontSize:'0.65rem', color:'#94a3b8' }}>
                    {doc.department} {doc.semester ? `· ${doc.semester}` : ''} {doc.subjectCode ? `· ${doc.subjectCode}` : ''}
                  </p>
                  <p style={{ margin:'0.2rem 0 0', fontSize:'0.65rem', color:'#94a3b8' }}>
                    By {doc.uploadedBy} · {formatSize(doc.fileSize)}
                  </p>
                </div>
                <div style={{ display:'flex', gap:'0.4rem', marginTop:'auto', paddingTop:'0.5rem' }}>
                  <button onClick={() => setPreviewDoc(doc)} style={{ flex:1, padding:'0.5rem', borderRadius:'0.45rem', background:'rgba(108,99,255,0.1)', border:'1px solid rgba(108,99,255,0.25)', color:'#a78bfa', fontSize:'0.7rem', fontWeight:700, cursor:'pointer' }}>👁️ View</button>
                  <button onClick={() => handleApprove(doc.id)} style={{ flex:1, padding:'0.5rem', borderRadius:'0.45rem', background:'rgba(52,211,153,0.15)', border:'1px solid rgba(52,211,153,0.3)', color:'#34d399', fontSize:'0.7rem', fontWeight:700, cursor:'pointer' }}>✓ Approve</button>
                  <button onClick={() => handleDelete(doc.id)} style={{ flex:1, padding:'0.5rem', borderRadius:'0.45rem', background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.25)', color:'#f87171', fontSize:'0.7rem', fontWeight:700, cursor:'pointer' }}>✕ Reject</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {previewDoc && (
        <div style={{ position:'fixed', inset:0, zIndex:1300, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.85)', backdropFilter:'blur(16px)', padding:'1rem' }} onClick={e => e.target === e.currentTarget && setPreviewDoc(null)}>
          <div style={{ width:'100%', maxWidth:'800px', maxHeight:'90vh', background:'rgba(15,23,42,0.97)', border:'1px solid rgba(51,65,85,0.6)', borderRadius:'1.5rem', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'1rem 1.5rem', borderBottom:'1px solid rgba(42,47,82,0.5)' }}>
              <h3 style={{ margin:0, fontSize:'1rem', fontWeight:800, color:'#f8fafc' }}>{previewDoc.title}</h3>
              <button onClick={() => setPreviewDoc(null)} style={{ padding:'0.4rem 0.75rem', borderRadius:'0.5rem', border:'1px solid rgba(71,85,105,0.5)', background:'transparent', color:'#94a3b8', fontSize:'0.8rem', cursor:'pointer' }}>✕</button>
            </div>
            <div style={{ flex:1, overflow:'auto', padding:'1rem', background:'rgba(0,0,0,0.2)', display: 'flex', justifyContent: 'center' }}>
              {isImage(previewDoc.fileType) ? (
                <img src={previewDoc.dataUrl} alt={previewDoc.title} style={{ maxWidth:'100%', maxHeight:'70vh', borderRadius:'0.5rem', objectFit:'contain' }} />
              ) : (
                <iframe src={previewDoc.dataUrl} title={previewDoc.title} style={{ width:'100%', height:'70vh', border:'none', borderRadius:'0.5rem', background:'#fff' }} />
              )}
            </div>
          </div>
        </div>
      )}
    </main>
  );
}

function App() {
  const [user, setUser] = useState(() => {
    try {
      const saved = localStorage.getItem('studentos_user');
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [page, setPage] = useState(() => {
    try {
      const hash = window.location.hash.replace('#/', '');
      return hash || 'dashboard';
    } catch { return 'dashboard'; }
  });

  useEffect(() => {
    const handleHashChange = () => {
      const hash = window.location.hash.replace('#/', '');
      setPage(hash || 'dashboard');
    };
    window.addEventListener('hashchange', handleHashChange);
    return () => window.removeEventListener('hashchange', handleHashChange);
  }, []);

  const navigateTo = (newPage) => {
    window.location.hash = newPage === 'dashboard' ? '' : `/${newPage}`;
  };

  const handleLogin = profile => {
    localStorage.setItem('studentos_user', JSON.stringify(profile));
    setUser(profile);
  };
  const handleLogout = () => {
    localStorage.removeItem('studentos_user');
    setUser(null);
    navigateTo('dashboard');
  };

  if (!user) return <Login onLogin={handleLogin} />;


  const shell = children => (
    <div className="bg-mesh" style={{ minHeight:'100vh', display:'flex', flexDirection:'column', fontFamily:"'Inter', sans-serif" }}>
      <Navbar user={user} onLogout={handleLogout}/>
      {children}
      <Footer/>
    </div>
  );

  if (page === 'todo')     return shell(<TodoPage onBack={() => navigateTo('dashboard')} user={user} />);
  if (page === 'calendar') return shell(<AcademicCalendarPage user={user} onBack={() => navigateTo('dashboard')}/>);
  if (page === 'gpa')      return shell(<GpaPage onBack={() => navigateTo('dashboard')}/>);
  if (page === 'noticeboard') return shell(<NoticeboardPage user={user} onBack={() => navigateTo('dashboard')}/>);
  if (page === 'private') return shell(<PrivateSpaceWorkspace user={user} onBack={() => navigateTo('dashboard')}/>);
  if (page === 'dept-vault') return shell(<DepartmentVaultPage user={user} onBack={() => navigateTo('dashboard')}/>);
  if (page === 'dept-vault-upload') return shell(<DepartmentVaultPage user={user} onBack={() => navigateTo('dashboard')} autoUpload={true}/>);
  if (page === 'admin-notes') return shell(<AdminNoteApprovalPage user={user} onBack={() => navigateTo('dashboard')}/>);
  return shell(
    <Dashboard
      user={user}
      onOpenTodo={()=>navigateTo('todo')}
      onOpenGpa={()=>navigateTo('gpa')}
      onOpenCalendar={()=>navigateTo('calendar')}
      onOpenNoticeboard={()=>navigateTo('noticeboard')}
      onOpenPrivate={()=>navigateTo('private')}
      onBrowseNotes={()=>navigateTo('dept-vault')}
      onUploadNote={()=>navigateTo('dept-vault-upload')}
      onOpenAdminNotes={()=>navigateTo('admin-notes')}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
